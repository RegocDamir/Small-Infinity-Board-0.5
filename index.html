        }
        .node.node-is-stack > .node-inner {
            overflow: visible;
        }
        .node.node-is-stack .node-header {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .node.node-is-stack .node-title {
            color: #d8eaff;
        }
        .node.node-is-stack .node-title::placeholder {
            color: rgba(180,210,255,0.5);
        }
        .node.node-is-stack .node-act-btn {
            color: #c0393f;
        }

        /* ── STACK EAR (satellite pill, sibling to .node in the scene) ── */
        .stack-ear {
            position: absolute;
            width: 35px;
            height: 92px;
            border-radius: 18px;
            z-index: 3;
            background: #2b4866;
            border: 2px solid #1e3650;
            box-shadow: 0 8px 22px rgba(0,0,0,0.38), 0 2px 6px rgba(0,0,0,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: grab;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .stack-ear:active { cursor: grabbing; }
        .stack-ear:hover,
        .stack-ear.ear-hover {
            border-color: rgba(92,225,230,0.45);
        }
        .stack-ear.ear-focused {
            border-color: #5ce1e6;
            box-shadow: 0 0 0 3px rgba(92,225,230,0.5), 0 0 18px rgba(92,225,230,0.45), 0 8px 22px rgba(0,0,0,0.38), 0 2px 6px rgba(0,0,0,0.25);
        }

        /* Top half: hatch grab zone */
        .stack-ear-grab {
            flex: 1;
            background: repeating-linear-gradient(
                -45deg,
                transparent, transparent 3px,
                rgba(255,255,255,0.09) 3px, rgba(255,255,255,0.09) 4.5px
            );
            transition: background 0.2s, box-shadow 0.2s;
        }
        .stack-ear.ear-focused .stack-ear-grab {
            background:
                repeating-linear-gradient(
                    -45deg,
                    transparent, transparent 3px,
                    rgba(255,255,255,0.13) 3px, rgba(255,255,255,0.13) 4.5px
                ),
                rgba(92, 225, 230, 0.2);
            box-shadow: inset 0 0 14px rgba(92, 225, 230, 0.45);
        }

        /* Bottom half: eject button */
        .stack-ear-eject {
            height: 38px;
            flex-shrink: 0;
            background: none;
            border: none;
            border-top: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #5ce1e6;
            transition: background 0.12s;
        }
        .stack-ear-eject:hover {
            background: rgba(255,255,255,0.1);
        }
        .stack-ear-eject svg {
            width: 14px;
            height: 14px;
            pointer-events: none;
        }

        .node-stack-area {
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            overflow: visible;
            border-radius: 6px;
            min-height: 80px;
        }

        /* Empty state — magnet icon */
        .stack-empty-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 16px 8px;
            color: rgba(160,200,255,0.45);
            font-size: 9.5px;
            text-align: center;
            letter-spacing: 0.08em;
        }
        .stack-empty-hint svg {
            width: 32px;
            height: 32px;
            opacity: 0.5;
        }

        /* Stacked cards — straight list layout */
        .stack-card {
            position: relative;
            width: 100%;
            background: #1e3255;
            border: 1.5px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.25);
            transition: box-shadow 0.15s;
            flex-shrink: 0;
        }
        .stack-card:hover {
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
        }

        .stack-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            font-size: 11px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            color: #d0e4ff;
        }
        .stack-card-header .stack-card-dots {
            display: flex;
            gap: 2px;
        }
        .stack-card-header .stack-card-dots .dot-circle {
            background: #c0393f;
        }

        .stack-card-content {
            padding: 6px 10px 8px;
            font-size: 11px;
            color: #c8dcff;
            overflow: hidden;
            border-top: 1px solid rgba(255,255,255,0.08);
            font-family: 'Roboto', sans-serif;
            white-space: pre-wrap;
            max-height: 100px;
        }

        /* Light mode overrides for stack — same palette in all modes */
        body.light .node.node-is-stack {
            background: #2b4866;
            border-color: #1e3650;
        }
        body.light .stack-ear {
            background: #2b4866;
            border-color: #1e3650;
        }
        body.light .stack-ear:hover,
        body.light .stack-ear.ear-hover {
            border-color: rgba(92,225,230,0.45);
        }
        body.light .stack-ear-eject {
            color: #5ce1e6;
        }
        body.light .stack-card {
            background: #1e3255;
        }

        /* ── NODE ── */
        .node {
            position: absolute;
            min-width: 120px;
            min-height: 90px;
            background: var(--node-bg);
            border: 2px solid var(--node-border);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.55), 0 8px 16px rgba(0, 0, 0, 0.35);
            transition: border-color 0.18s, box-shadow 0.18s;
            overflow: visible;
            z-index: 2;
        }

        .node>.node-inner {
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            flex: 1;
        }

        .node:hover {
            border-color: rgba(255, 255, 255, 0.26);
        }

        .node.conn-target-glow {
            border-color: rgba(180, 180, 180, 0.6) !important;
            box-shadow: 0 0 0 3px rgba(180, 180, 180, 0.1), 0 4px 28px rgba(0, 0, 0, 0.55);
        }

        .node-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 7px 8px 7px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            cursor: grab;
            background: transparent;
            gap: 6px;
        }

        .node-header:active {
            cursor: grabbing;
        }

        /* Title input lives in the header */
        .node-title {
            flex: 0 1 55%;
            min-width: 0;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            font-size: calc(18px * var(--zoom-inv, 1));
            cursor: text;
            padding: 2px 6px;
            border-radius: 4px;
        }
        body.light .node-title {
            background: rgba(0, 0, 0, 0.06);
        }

        .node-title::placeholder {
            color: var(--placeholder-color);
            font-weight: 700;
        }

        body.light .node-title::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }


        .node-act-btn {
            background: none;
            border: none;
            color: #c0393f;
            cursor: pointer;
            padding: 8px 8px;
            /* Larger hit area */
            margin: -4px -2px -4px 0;
            /* Offset to keep layout stable */
            border-radius: 4px;
            transition: all 0.13s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .node-act-btn:hover {
            background: rgba(255, 255, 255, 0.07);
            color: var(--text);
        }

        .dot-circle {
            display: block;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .node-body {
            flex: 1;
            padding: 10px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow: hidden;
            position: relative;
        }

        /* ── CONTENT TYPES ── */
        .node-text-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 9px;
            padding: 8px 10px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            resize: none;
            outline: none;
            flex: 1;
            min-height: 64px;
            transition: border-color 0.13s;
        }

        .node-text-input::placeholder {
            color: var(--placeholder-color);
            opacity: 0.8;
        }

        .node-text-input:focus {
            border-color: rgba(200, 255, 0, 0.28);
        }

        body.light .node-text-input {
            background: #d9d2c8;
            color: rgba(0, 0, 0, 0.85);
        }

        body.light .node-text-input::placeholder {
            color: #0d383b;
            opacity: 1;
        }

        .node-img-area {
            width: 100%;
            flex: 1;
            min-height: 72px;
            background: rgba(255, 255, 255, 0.025);
            border: 1px solid #c0393f;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.13s;
            color: var(--placeholder-color);
            font-size: clamp(9.5px, 2.5%, 15px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .node-img-area svg {
            width: clamp(22px, 9%, 56px);
            height: clamp(22px, 9%, 56px);
        }

        .node-img-area:hover {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.04);
        }

        .node-img-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            inset: 0;
            border-radius: 8px;
        }

        .node-img-area input {
            display: none;
        }

        .node-video-area {
            width: 100%;
            flex: 1;
            min-height: 84px;
            background: #000;
            border: 1px solid #c0393f;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .node-video-area video {
            width: 100%;
            border-radius: 10px;
            display: block;
        }

        .node-video-area .video-ph {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--placeholder-color);
            font-size: clamp(9.5px, 2.5%, 15px);
            cursor: pointer;
            padding: 16px;
            text-align: center;
        }

        .node-video-area .video-ph svg {
            width: clamp(26px, 9%, 60px);
            height: clamp(26px, 9%, 60px);
        }

        .node-video-area input {
            display: none;
        }

        .node-video-area.has-audio,
        .node-video-area.has-video {
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            padding: 6px;
            gap: 6px;
        }

        .node-video-area.has-video video {
            width: 100%;
            flex: 1;
            min-height: 0;
            object-fit: contain;
            border-radius: 8px;
        }

        .media-trim {
            width: 100%;
            flex-shrink: 0;
            user-select: none;
        }

        .media-trim-track {
            position: relative;
            height: calc(12px / max(1, var(--zoom, 1)));
            background: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            cursor: crosshair;
            outline: none;
        }

        .media-trim-track:focus {
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .media-trim-cut {
            position: absolute;
            top: 0;
            bottom: 0;
            background: rgba(25, 25, 25, 0.88);
            border-left: 1px dashed rgba(255, 255, 255, 0.18);
            border-right: 1px dashed rgba(255, 255, 255, 0.18);
            box-sizing: border-box;
        }

        .media-trim-cut[data-idx] {
            cursor: context-menu;
        }

        .media-trim-handle {
            position: absolute;
            top: calc(-2px / max(1, var(--zoom, 1)));
            bottom: calc(-2px / max(1, var(--zoom, 1)));
            width: calc(6px / max(1, var(--zoom, 1)));
            margin-left: calc(-3px / max(1, var(--zoom, 1)));
            background: #ff4a52;
            border-radius: 2px;
            cursor: ew-resize;
            z-index: 3;
        }

        .media-trim-handle[data-role="start"],
        .media-trim-handle[data-role="end"] {
            background: #fff;
        }

        .media-trim-playhead {
            position: absolute;
            top: calc(-3px / max(1, var(--zoom, 1)));
            bottom: calc(-3px / max(1, var(--zoom, 1)));
            width: 1px;
            background: rgba(255, 255, 255, 0.9);
            pointer-events: none;
            z-index: 2;
        }

        .node-video-area canvas.audio-waveform {
            width: 100%;
            flex: 1;
            min-height: 0;
            display: block;
            cursor: pointer;
        }

        .node-video-area audio.audio-player {
            width: 100%;
            height: 30px;
            flex-shrink: 0;
            filter: invert(0.9) hue-rotate(180deg);
        }

        .nested-chip {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 5px;
            padding: 3px 9px;
            font-size: 8.5px;
            color: var(--muted);
            font-family: 'Syne', sans-serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .node-malik-area {
            width: 100%;
            height: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            background: rgba(255, 255, 255, 0.025);
            border: 1.5px solid #c0393f;
            border-radius: 10px;
            padding: 8px;
            position: relative;
        }

        body.light .node-malik-area {
            background: #d9d2c8;
        }

        .malik-chat {
            flex: 1;
            overflow-y: auto;
            font-family: 'Roboto', sans-serif;
            font-size: 11.5px;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 4px;
            margin-bottom: 5px;
        }

        .malik-chat::-webkit-scrollbar {
            width: 2px;
        }

        .malik-chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* While anything is being dragged on the board, neutralise event-eating
           children (iframes, video) so mouseup always reaches the document
           handler. Without this, releasing over an iframe leaves the drag
           orphaned — node/connector stuck to the cursor. */
        body.is-dragging .node-html-frame,
        body.is-dragging .node-video-area video,
        body.is-dragging .node-video-area audio,
        body.is-dragging .node-video-area canvas,
        body.is-dragging iframe { pointer-events: none !important; }

        /* Global thin scrollbars (≈half of browser default 15-17px) */
        ::-webkit-scrollbar { width: 7px; height: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.28); }
        body.light ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); }
        body.light ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.32); }
        * { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
        body.light * { scrollbar-color: rgba(0,0,0,0.18) transparent; }

        .malik-msg {
            background: rgba(255, 255, 255, 0.06);
            padding: 7px 10px;
            border-radius: 7px;
            word-wrap: break-word;
            white-space: pre-wrap;
            line-height: 1.4;
        }

        .malik-msg.user {
            background: rgba(200, 255, 0, 0.1);
            align-self: flex-end;
            color: var(--text);
        }

        body.light .malik-msg.user {
            background: rgba(19, 145, 219, 0.8);
        }

        .malik-msg.ai {
            align-self: flex-start;
            border-left: 2px solid var(--accent2);
        }

        body.light .malik-msg.ai {
            background: rgba(118, 71, 212, 0.8);
            border-left: 2px solid #006eff;
        }

        .malik-msg.error {
            border-left: 2px solid #ff4444;
            color: #ffaa44;
        }

        .malik-input-wrap {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .malik-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 11.5px;
            padding: 6px 9px;
            outline: none;
            resize: none;
            height: 32px;
            line-height: 1.4;
        }

        .malik-input:focus {
            border-color: rgba(200, 255, 0, 0.3);
        }

        body.light .malik-input:focus {
            border-color: rgba(0, 110, 255, 0.3);
        }

        .malik-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            cursor: pointer;
            padding: 0 12px;
            font-weight: bold;
            transition: 0.15s;
            font-size: 12px;
        }

        .malik-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        body.light .malik-btn {
            background: #197278;
            border-color: #197278;
            color: #fff;
        }

        body.light .malik-btn:hover {
            background: #1e8a91;
            border-color: #1e8a91;
        }

        .malik-settings {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .malik-key,
        .malik-endpoint,
        .malik-model,
        .malik-provider {
            width: 100%;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 5px;
            color: var(--text);
            font-size: 9.5px;
            padding: 4px 7px;
            outline: none;
            transition: all 0.15s;
        }

        .malik-provider {
            cursor: pointer;
        }

        .malik-key:focus,
        .malik-endpoint:focus,
        .malik-model:focus,
        .malik-provider:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .malik-key::placeholder,
        .malik-endpoint::placeholder,
        .malik-model::placeholder {
            color: var(--placeholder-color);
        }

        /* ── CONNECTION PORTS ── */
        .conn-port {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--port-bg);
            border: 1.5px solid var(--port-border);
            border-radius: 50%;
            cursor: crosshair;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.14s, background 0.14s;
            box-shadow: none;
        }

        .node:hover .conn-port {
            opacity: 1;
            pointer-events: all;
        }

        .conn-port:hover {
            background: var(--port-hover);
        }

        .conn-port.port-right {
            right: -5px;
            top: 50%;
            transform: translateY(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-left {
            left: -5px;
            top: 50%;
            transform: translateY(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-top {
            top: -5px;
            left: 50%;
            transform: translateX(-50%) scale(var(--zoom-inv, 1));
        }

        .conn-port.port-bottom {
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%) scale(var(--zoom-inv, 1));
        }

        /* ── RESIZE HANDLES ── */
        .resize-handle {
            position: absolute;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.14s;
        }

        .node:hover .resize-handle {
            opacity: 1;
        }

        .resize-handle.edge-n {
            top: -4px;
            left: 20px;
            right: 20px;
            height: 8px;
            cursor: n-resize;
        }

        .resize-handle.edge-s {
            bottom: -4px;
            left: 20px;
            right: 20px;
            height: 8px;
            cursor: s-resize;
        }

        .resize-handle.edge-e {
            right: -4px;
            top: 20px;
            bottom: 20px;
            width: 8px;
            cursor: e-resize;
        }

        .resize-handle.edge-w {
            left: -4px;
            top: 20px;
            bottom: 20px;
            width: 8px;
            cursor: w-resize;
        }

        .resize-handle.corner-nw {
            top: -5px;
            left: -5px;
            width: 14px;
            height: 14px;
            cursor: nw-resize;
        }

        .resize-handle.corner-ne {
            top: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            cursor: ne-resize;
        }

        .resize-handle.corner-se {
            bottom: -5px;
            right: -5px;
            width: 14px;
            height: 14px;
            cursor: se-resize;
        }

        .resize-handle.corner-sw {
            bottom: -5px;
            left: -5px;
            width: 14px;
            height: 14px;
            cursor: sw-resize;
        }

        .resize-handle.corner-nw::after,
        .resize-handle.corner-ne::after,
        .resize-handle.corner-se::after,
        .resize-handle.corner-sw::after {
            content: none;
        }

        /* ── UNDEREAR (satellite under-node strip — holds focus toggle now,
               more icons later. Counter-scales below 100% zoom so it never
               shrinks past its native size). ── */
        .node-corner-icons {
            position: absolute;
            left: 0;
            top: calc(100% + 6px);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            backdrop-filter: blur(6px);
            z-index: 3;
            pointer-events: auto;
            transform: scale(var(--ear-counter, 1));
            transform-origin: 0% 0%;
        }
        body.light .node-corner-icons {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.08);
        }
        .node-corner-icon {
            position: relative;
            width: 14px;
            height: 14px;
            padding: 0;
            margin: 0;
            border: 0;
            background: transparent;
            cursor: pointer;
            opacity: 0.75;
            transition: opacity 0.22s;
            pointer-events: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Expanded magnetic hit zone — ~22×22 around a 10×10 icon */
        .node-corner-icon::before {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 4px;
        }
        .node-corner-icon img {
            width: 100%;
            height: 100%;
            display: block;
            filter: invert(1);
            pointer-events: none;
        }
        .node-corner-icon:hover  { opacity: 0.95; }
        .node-corner-icon.active { opacity: 1; }

        /* ── SVG CONNECTIONS ── */
        .conn-line {
            stroke: var(--conn-color);
            stroke-width: max(2px, calc(0.8px + (1.2px / var(--zoom, 1))));
            fill: none;
            transition: stroke 0.15s, opacity 0.15s;
        }

        .conn-pulse {
            fill: var(--pulse-color);
            opacity: 0.9;
            filter: drop-shadow(0 0 0.33px var(--pulse-color));
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .conn-group {
            pointer-events: none;
            /* Let the children (.conn-hitbox and .conn-del-btn) handle the pointer events */
            cursor: pointer;
        }

        .conn-hitbox {
            stroke: transparent;
            stroke-width: 14;
            /* Reduced static width for more precision */
            fill: none;
            pointer-events: stroke;
        }

        .conn-del-btn {
            opacity: 0;
            cursor: pointer;
            visibility: hidden;
            pointer-events: all;
            transition: opacity 0.15s, visibility 0s 0.15s;
        }

        .conn-group:hover .conn-del-btn {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.15s 0.6s, visibility 0s 0.6s;
        }

        .conn-group:hover .conn-line {
            stroke: #ff7070;
            opacity: 0.8;
            transition: stroke 0.15s 0.6s, opacity 0.15s 0.6s;
        }

        .conn-del-btn circle {
            transition: fill 0.1s;
        }

        .conn-del-btn:hover circle {
            fill: #ff1111;
        }

        .conn-line-temp {
            stroke: var(--conn-color);
            opacity: 0.6;
            stroke-width: 1.2;
            fill: none;
            stroke-dasharray: 5 4;
            pointer-events: none;
            animation: dash-temp 1.2s linear infinite;
        }

        @keyframes dash-temp {
            to {
                stroke-dashoffset: -18;
            }
        }

        /* ── CONTEXT MENU ── */
        #ctx-menu {
            position: fixed;
            background: var(--bar-bg);
            border: 1px solid var(--bar-border);
            border-radius: 13px;
            padding: 5px;
            min-width: 150px;
            z-index: 2000;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            display: none;
        }

        .ctx-item {
            padding: 7px 12px;
            font-size: 11px;
            color: var(--ctx-text);
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.1s;
            font-family: 'DM Mono', monospace;
        }

        .ctx-item:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .ctx-item.danger:hover {
            background: rgba(255, 60, 60, 0.13);
            color: #ff7070;
        }

        .ctx-sep {
            height: 1px;
            background: var(--bar-border);
            margin: 4px 0;
        }

        /* ── HUD ── */
        #zoom-hud {
            position: fixed;
            top: 18px;
            right: 18px;
            font-size: 10px;
            color: rgba(0, 0, 0, 0.25);
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.1em;
            pointer-events: none;
            z-index: 999;
        }

        /* ─────────────────────── SIDE PANEL ─────────────────────── */
        #side-panel {
            position: fixed;
            top: 50%;
            left: 12px;
            transform: translate(calc(-100% - 14px), -50%);
            width: calc(100vw / 6);
            height: calc(100vh - 24px);
            background: var(--bar-bg);
            border: 1.5px solid red;
            border-radius: 10px;
            backdrop-filter: blur(24px);
            box-shadow: 7px 11px 48px rgba(0, 110, 255, 0.31), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
            z-index: 1100;
            transition: transform 0.28s cubic-bezier(.65, 0, .35, 1);
            color: var(--text);
            display: flex;
            flex-direction: column;
            padding: 10px;
        }
        body.sp-open #side-panel { transform: translate(0, -50%); }
        /* Closing should feel quick. */
        body:not(.sp-open) #side-panel { transition: transform 0.18s cubic-bezier(.4, 0, .6, 1); }

        body.light #side-panel {
            border: 1.5px solid #ff751f;
            box-shadow: 0 0 0 1px #ff751f inset, 7px 11px 48px rgba(0, 110, 255, 0.31);
        }

        /* Close (×) button — top-left of panel */
        #side-panel-close {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
            line-height: 1;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
        }
        #side-panel-close:hover {
            background: var(--tb-hover-bg);
            color: var(--tb-hover-text);
            border-color: var(--tb-hover-border);
        }

        /* Folder-style tag peeking out of the left edge */
        #side-panel-tag {
            position: fixed;
            top: 50%;
            left: 0;
            width: 22px;
            height: 56px;
            transform: translate(-100%, -50%);
            background: var(--bar-bg);
            border: 1px solid var(--bar-border);
            border-left: none;
            border-radius: 0 7px 7px 0;
            backdrop-filter: blur(24px);
            cursor: pointer;
            z-index: 1099;
            transition: transform 0.22s cubic-bezier(.4, 0, .2, 1);
            box-shadow: 4px 4px 18px rgba(0, 0, 0, 0.25);
        }
        body.sp-tag-visible #side-panel-tag { transform: translate(0, -50%); }
        #side-panel-tag:hover {
            background: rgba(255, 255, 255, 0.10);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 4px 4px 22px rgba(0, 0, 0, 0.3), 0 0 8px rgba(255, 255, 255, 0.08) inset;
        }
        body.light #side-panel-tag:hover {
            background: rgba(0, 110, 255, 0.10);
            border-color: rgba(0, 110, 255, 0.55);
            box-shadow: 4px 4px 22px rgba(0, 0, 0, 0.15), 0 0 8px rgba(0, 110, 255, 0.18) inset;
        }
        body.sp-open #side-panel-tag { transform: translate(-100%, -50%) !important; }

        body.light #side-panel-tag {
            border-color: #ff751f;
            border-left: none;
        }

        /* ── DOCK TARGET HIGHLIGHT ── */
        /* While the user is dragging the toolbar, the panel's bottom-left
           corner lights up to show the snap zone. */
        #side-panel-dock-zone { display: none; }

        /* ── CHART PICKER ── */
        #cp-section {
            margin-top: 36px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            flex: 0 0 auto;
        }
        #cp-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 8px 11px;
            border: 1.2px solid red;
            border-radius: 5px;
            background: var(--bar-bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.02em;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s;
        }
        body.light #cp-toggle {
            border-color: #ff751f;
            color: #1a1a1a;
        }
        #cp-toggle:hover {
            color: var(--tb-hover-text);
            border-color: var(--tb-hover-border);
            background: var(--tb-hover-bg);
        }
        .cp-caret {
            font-size: 11px;
            opacity: 0.7;
            transition: transform 0.18s ease;
            margin-left: 8px;
        }
        #cp-section.cp-open .cp-caret {
            transform: rotate(180deg);
        }
        #cp-list {
            display: none;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            padding: 4px;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            max-height: calc(100vh - 200px);
            background: var(--bar-bg);
            border: 1.2px solid var(--node-border);
            border-radius: 5px;
            backdrop-filter: blur(24px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 50;
        }
        #cp-section.cp-open #cp-list {
            display: flex;
        }
        .cp-item {
            display: flex;
            align-items: stretch;
            justify-content: space-between;
            gap: 0;
            padding: 0 0 0 10px;
            border: none;
            border-left: 2px solid red;
            border-radius: 3px;
            background: rgba(0, 110, 255, 0.10);
            font-family: 'Roboto', sans-serif;
            font-size: 12px;
            font-weight: 400;
            color: var(--text);
            min-height: 30px;
            overflow: hidden;
        }
        body.light .cp-item {
            border-left-color: #ff751f;
            background: rgba(255, 117, 31, 0.10);
            color: #1a1a1a;
        }
        /* Controller row — opposite color so it stands out from charts */
        .cp-item.cp-controller {
            border-left-color: #ff751f;
            background: rgba(255, 117, 31, 0.10);
        }
        body.light .cp-item.cp-controller {
            border-left-color: #006eff;
            background: rgba(0, 110, 255, 0.12);
        }
        .cp-item-name {
            flex: 1 1 auto;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            align-self: center;
            padding: 6px 8px 6px 0;
        }
        .cp-copy-btn {
            flex: 0 0 auto;
            font-family: 'Roboto', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.04em;
            color: var(--text);
            background: rgba(0, 110, 255, 0.20);
            border: none;
            border-right: 2px solid red;
            border-radius: 0 3px 3px 0;
            padding: 0 12px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            display: flex;
            align-items: center;
        }
        body.light .cp-copy-btn {
            border-right-color: #ff751f;
            background: rgba(255, 117, 31, 0.20);
            color: #1a1a1a;
        }
        .cp-copy-btn:hover {
            background: rgba(0, 110, 255, 0.32);
        }
        body.light .cp-copy-btn:hover {
            background: rgba(255, 117, 31, 0.30);
        }
        /* Controller copy button — opposite color */
        .cp-item.cp-controller .cp-copy-btn {
            background: rgba(255, 117, 31, 0.20);
            border-right-color: #ff751f;
        }
        .cp-item.cp-controller .cp-copy-btn:hover {
            background: rgba(255, 117, 31, 0.32);
        }
        body.light .cp-item.cp-controller .cp-copy-btn {
            background: rgba(0, 110, 255, 0.20);
            border-right-color: #006eff;
        }
        body.light .cp-item.cp-controller .cp-copy-btn:hover {
            background: rgba(0, 110, 255, 0.32);
        }
        .cp-copy-btn.cp-copied {
            color: rgba(200, 255, 0, 0.95);
            background: rgba(200, 255, 0, 0.18);
            border-right-color: rgba(200, 255, 0, 0.65);
        }
        body.light .cp-copy-btn.cp-copied {
            color: #8a3a00;
            background: rgba(255, 117, 31, 0.40);
            border-right-color: #ff751f;
        }
        .cp-copy-btn.cp-failed {
            color: rgba(255, 100, 100, 0.95);
            background: rgba(255, 100, 100, 0.18);
            border-right-color: rgba(255, 100, 100, 0.65);
        }
        body.light .cp-copy-btn.cp-failed {
            color: #a02020;
            background: rgba(255, 100, 100, 0.25);
            border-right-color: #d04040;
        }
        .cp-empty {
            font-family: 'Roboto', sans-serif;
            font-size: 11px;
            line-height: 1.5;
            color: var(--muted);
            padding: 10px 8px;
            border: 1px dashed rgba(255, 255, 255, 0.18);
            border-radius: 5px;
        }
        body.light .cp-empty {
            border-color: rgba(0, 0, 0, 0.18);
        }

        /* ── TOOLBAR (always above the panel on Z-axis) ── */
        #toolbar { z-index: 1110 !important; }

        /* ── DOCKED TOOLBAR ── */
        /* When docked, the toolbar attaches flush to the panel's right edge,
           rotated 90° (vertical). When the panel slides closed, the docked
           bar slides off with it (left ties to panel position via transform). */
        body.sp-tb-docked #toolbar {
            position: fixed !important;
            left: calc(12px + 70px) !important;
            top: auto !important;
            bottom: 12px !important;
            transform: none !important;
            transform-origin: bottom left;
            transition: transform 0.28s cubic-bezier(.65, 0, .35, 1);
        }
        body.sp-tb-docked:not(.sp-open) #toolbar {
            transform: translateX(calc(-100% - (100vw / 6) - 26px)) !important;
            transition: transform 0.18s cubic-bezier(.4, 0, .6, 1);
        }
        #tb-rotate-wrapper {
            transform-style: preserve-3d;
        }
        body.sp-tb-docked #tb-rotate-wrapper {
            transform: rotate(-90deg) translateY(-100%);
            transform-origin: top left;
        }
        body.sp-tb-docked #tb-flipcard {
            /* positioning handled by #tb-rotate-wrapper; flipcard only flips */
        }
        /* Flip animate-mode — same rotateX(180deg) as undocked, now pivots
           around the flipcard's own center (50% 50% default origin). */
        body.sp-tb-docked.anim-mode #tb-flipcard {
            transform: rotateX(180deg);
        }
        /* Counter-rotate icon labels & stacked controls so they remain readable. */
        body.sp-tb-docked .tb-btn,
        body.sp-tb-docked .tb-icon-btn,
        body.sp-tb-docked #tb-logo,
        body.sp-tb-docked #tb-logo-b,
        body.sp-tb-docked .tb-theme-stack,
        body.sp-tb-docked #tb-drag-handle,
        body.sp-tb-docked #tb-drag-handle-b {
            transform: rotate(90deg);
        }
        body.sp-tb-docked .tb-sep {
            width: 22px;
            height: 1px;
        }

        /* ── DOCK CONTROLS — sit in the panel-left column, aligned with the docked bar ── */
        #tb-dock-controls {
            position: fixed;
            left: 21px;
            bottom: 20px;
            width: 59px;
            display: none;
            flex-direction: column;
            gap: 4px;
            z-index: 1112;
        }
        body.sp-open #tb-dock-controls {
            display: flex;
        }
        #tb-dock-controls button {
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.04em;
            color: var(--muted);
            background: var(--bar-bg);
            border: 1.2px solid red;
            border-radius: 5px;
            padding: 4px 0;
            cursor: pointer;
            width: 100%;
            transition: all 0.15s;
        }
        body.light #tb-dock-controls button {
            border-color: #ff751f;
        }
        #tb-dock-controls button:hover {
            color: var(--tb-hover-text);
            border-color: var(--tb-hover-border);
            background: var(--tb-hover-bg);
        }
        #btn-tuck-toggle {
            display: none;
        }
        body.sp-tb-docked #btn-tuck-toggle {
            display: block;
        }
        /* Tuck: slide toolbar left behind the panel edge */
        body.sp-tb-docked.sp-tb-tucked #toolbar {
            transform: translateX(calc(-100% - 100px)) !important;
            transition: transform 0.3s cubic-bezier(.65, 0, .35, 1) !important;
        }

        /* ════════════════════════════════════════════════════════════════ */
        /*  TEXT LAYER                                                      */
        /* ════════════════════════════════════════════════════════════════ */

        .text-item {
            position: absolute;
            min-width: 100px;
            min-height: 2em;
            width: max-content;
            cursor: move;
        }

        .text-item.text-selected {
            z-index: 1000 !important;
        }

        .text-input {
            display: block;
            width: auto;
            min-width: 4ch;
            field-sizing: content;
            height: auto;
            padding: 4px 8px;
            background: transparent;
            border: none;
            border-bottom: 2px solid transparent;
            outline: none;
            font-size: 32px;
            font-family: system-ui;
            color: #000000;
            white-space: nowrap;
            resize: none;
            cursor: inherit;
        }

        .text-input:focus {
            border-bottom-color: var(--accent);
        }

        .text-item:not(.text-editing) .text-input {
            pointer-events: none;
            user-select: none;
        }

        .text-item.text-editing {
            cursor: text;
        }

        .text-chrome {
            position: absolute;
            top: -12px;
            left: -12px;
            width: calc(100% + 24px);
            height: calc(100% + 24px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            border: 1px solid rgba(180, 120, 255, 0.45);
            border-radius: 2px;
        }

        .text-item.text-selected .text-chrome {
            opacity: 1;
            pointer-events: auto;
        }

        .text-handle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border: 2px solid #000;
            border-radius: 50%;
            cursor: ns-resize;
            z-index: 2;
        }

        .text-handle-n,
        .text-handle-e,
        .text-handle-s,
        .text-handle-w { display: none; }
        .text-handle-ne { top: 0; right: 0; cursor: nesw-resize; }
        .text-handle-se { bottom: 0; right: 0; cursor: nwse-resize; }
        .text-handle-sw { bottom: 0; left: 0; cursor: nesw-resize; }
        .text-handle-nw { top: 0; left: 0; cursor: nwse-resize; }

        .text-rotate-knob {
            position: absolute;
            width: 12px;
            height: 12px;
            background: var(--accent2);
            border: 2px solid #000;
            border-radius: 50%;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            cursor: grab;
            z-index: 2;
        }

        .text-rotate-knob:active {
            cursor: grabbing;
        }

        .text-slide-up {
            animation: text-slide-up 0.5s ease-out forwards;
        }

        @keyframes text-slide-up {
            0% {
                transform: translateY(20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ════════════════════════════════════════════════════════════════ */
        /*  TEXT CONTROLS PANEL                                             */
        /* ════════════════════════════════════════════════════════════════ */

        #text-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 12px;
            border-top: 1.5px solid var(--node-border);
            border-bottom: 1.5px solid var(--node-border);
        }

        #btn-add-text {
            padding: 8px 12px;
            background: var(--node-bg);
            color: var(--text);
            border: 1.5px solid var(--node-border);
            border-radius: 4px;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #btn-add-text:hover {
            background: var(--tb-hover-bg);
            border-color: var(--tb-hover-border);
        }

        #btn-add-text.active {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .tc-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
        }

        .tc-row label {
            flex-shrink: 0;
            width: 60px;
            color: var(--muted);
        }

        .tc-row select,
        .tc-row input[type="range"] {
            flex: 1;
            padding: 4px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--node-border);
            color: var(--text);
            border-radius: 2px;
            font-family: 'DM Mono', monospace;
            font-size: 11px;
        }

        .tc-row input[type="color"] {
            width: 40px;
            height: 24px;
            padding: 2px;
            border: 1px solid var(--node-border);
            border-radius: 2px;
            cursor: pointer;
        }

        .tc-effects {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--node-border);
        }

        .tc-effect-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .tc-effect-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
        }

        .tc-effect-group input[type="checkbox"] {
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .tc-effect-controls {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-left: 20px;
            font-size: 10px;
        }

        .tc-effect-controls .tc-row {
            gap: 6px;
            font-size: 10px;
        }

        .tc-effect-controls label {
            width: 50px;
        }
    </style>
</head>

<body>

    <div id="canvas-wrap">
        <div id="dot-grid"></div>
        <div id="anim-bg"></div>
        <div id="scene">
            <svg id="connections">
            </svg>
        </div>
    </div>

    <div id="toolbar">
        <div id="tb-rotate-wrapper">
        <div id="tb-flipcard">

            <!-- ═══ FRONT FACE ═══ -->
            <div class="tb-face tb-front">
                <div id="tb-drag-handle">
                    <svg width="10" height="18" viewBox="0 0 10 18" fill="currentColor">
                        <circle cx="1.5" cy="3" r="1.2" /><circle cx="1.5" cy="9" r="1.2" /><circle cx="1.5" cy="15" r="1.2" />
                        <circle cx="8.5" cy="3" r="1.2" /><circle cx="8.5" cy="9" r="1.2" /><circle cx="8.5" cy="15" r="1.2" />
                    </svg>
                </div>
                <div id="tb-logo" title="Right click to upload PNG logo"></div>
                <button class="tb-btn" id="btn-text" onclick="setAddMode('text')" title="Add text node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="3.5" width="13" height="1.8" rx="0.9" fill="currentColor" /><rect x="2" y="7.5" width="9" height="1.8" rx="0.9" fill="currentColor" /><rect x="2" y="11.5" width="11" height="1.8" rx="0.9" fill="currentColor" /></svg>
                    TEXT
                </button>
                <button class="tb-btn" id="btn-image" onclick="setAddMode('image')" title="Add image node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2.5" width="13" height="12" rx="2.5" stroke="currentColor" stroke-width="1.4" /><circle cx="6" cy="6.5" r="1.4" fill="currentColor" /><path d="M2 11.5l3.5-3 3 2.5 2-1.5 4.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" /></svg>
                    IMAGE
                </button>
                <button class="tb-btn" id="btn-video" onclick="setAddMode('video')" title="Add video or audio node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="1.5" y="3.5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M11.5 7l4-2v7l-4-2V7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg>
                    VIDEO
                </button>
                <button class="tb-btn" id="btn-malik" onclick="setAddMode('malik')" title="Add Malik node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M8.5 2C8.5 2 9.5 6 13 6C9.5 6 8.5 10 8.5 10C8.5 10 7.5 6 4 6C7.5 6 8.5 2 8.5 2Z" fill="currentColor" /><path d="M13.5 10C13.5 10 14 12 15.5 12C14 12 13.5 14 13.5 14C13.5 14 13 12 11.5 12C13 12 13.5 10 13.5 10Z" fill="currentColor" /><path d="M4.5 12C4.5 12 5 13.5 6.5 13.5C5 13.5 4.5 15 4.5 15C4.5 15 4 13.5 2.5 13.5C4 13.5 4.5 12 4.5 12Z" fill="currentColor" /></svg>
                    MALIK
                </button>
                <button class="tb-btn" id="btn-group" onclick="setAddMode('group')" title="Add group — or middle-click &amp; drag canvas">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2.5" y="2.5" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2 2" /><path d="M6 6h5v5H6z" fill="currentColor" opacity="0.5" /></svg>
                    GROUP
                </button>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="Reset view (Home)" onclick="resetView()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L9 4.5L15 9V14H3V9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M7.5 14V11.5C7.5 10.95 7.95 10.5 8.5 10.5H9.5C10.05 10.5 10.5 10.95 10.5 11.5V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <div class="tb-theme-stack">
                    <div class="theme-switch-wrap theme-switch" title="Toggle dark / light">
                        <div class="switch-button">
                            <label class="switch-outer">
                                <input type="checkbox" onchange="toggleTheme()">
                                <div class="button">
                                    <div class="button-toggle"></div>
                                    <div class="button-indicator"></div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <button class="anim-btn" onclick="toggleAnimMode()" title="Toggle animate mode">
                        <div class="loader"></div>
                    </button>
                </div>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="New Board" onclick="newBoard()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></svg></button>
                <button class="tb-icon-btn" title="Save to File" onclick="exportToFile()"><svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M4 2v4h7V2M4 15v-5h9v5" stroke="currentColor" stroke-width="1.2" /></svg></button>
                <button class="tb-icon-btn" title="Load from File" onclick="importFromFile()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 14V6h14v8H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><path d="M2 6V4a1 1 0 011-1h4l2 2h6a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg></button>
            </div>

            <!-- ═══ BACK FACE (ANIMATE) ═══ -->
            <div class="tb-face tb-back">
                <div id="tb-drag-handle-b" class="tb-drag-handle-b">
                    <svg width="10" height="18" viewBox="0 0 10 18" fill="currentColor">
                        <circle cx="1.5" cy="3" r="1.2" /><circle cx="1.5" cy="9" r="1.2" /><circle cx="1.5" cy="15" r="1.2" />
                        <circle cx="8.5" cy="3" r="1.2" /><circle cx="8.5" cy="9" r="1.2" /><circle cx="8.5" cy="15" r="1.2" />
                    </svg>
                </div>
                <div id="tb-logo-b"></div>
                <button class="tb-btn" id="btn-stack" onclick="setAddMode('stack')" title="Add stack node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <rect x="1.5" y="6" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/>
                        <rect x="3" y="3.5" width="11" height="3" rx="1.5" stroke="currentColor" stroke-width="1.2" opacity="0.65"/>
                        <rect x="4.5" y="1.5" width="8" height="2.5" rx="1.2" stroke="currentColor" stroke-width="1.1" opacity="0.35"/>
                    </svg>
                    STACK
                </button>
                <button class="tb-btn" id="btn-kframe" title="K-Frame: record &amp; restore node positions" onclick="toggleKFrame()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <!-- Single large hollow diamond, standard keyframe marker -->
                        <path d="M8.5 1L16 8.5L8.5 16L1 8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    </svg>
                    K-FRAME
                </button>
                <button class="tb-btn" id="btn-cam-zoom" title="Zoom to node" onclick="toggleCamZoom()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <circle cx="7.5" cy="7.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7.5 5.5v4M5.5 7.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    ZOOM
                </button>
                <button class="tb-btn" id="btn-flip-frame" title="Flip node" onclick="toggleFlipMode()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <!-- Left triangle: pointing RIGHT, like a play button -->
                        <path d="M1.5 3.5L7.5 8.5L1.5 13.5Z" fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
                        <!-- Right triangle: pointing LEFT, mirrored, dimmer -->
                        <path d="M15.5 3.5L9.5 8.5L15.5 13.5Z" fill="currentColor" opacity="0.4" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
                        <!-- Center dashed dividing line -->
                        <line x1="8.5" y1="3" x2="8.5" y2="14" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5 2" stroke-linecap="round"/>
                    </svg>
                    FLIP
                </button>
                <button class="tb-btn" id="btn-html" title="HTML node" onclick="setAddMode('html')">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <path d="M5 4L1.5 8.5L5 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 4L15.5 8.5L12 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 2.5L7 14.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    HTML
                </button>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="Reset view (Home)" onclick="resetView()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L9 4.5L15 9V14H3V9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M7.5 14V11.5C7.5 10.95 7.95 10.5 8.5 10.5H9.5C10.05 10.5 10.5 10.95 10.5 11.5V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <div class="tb-theme-stack">
                    <div class="theme-switch-wrap theme-switch" title="Toggle dark / light">
                        <div class="switch-button">
                            <label class="switch-outer">
                                <input type="checkbox" onchange="toggleTheme()">
                                <div class="button">
                                    <div class="button-toggle"></div>
                                    <div class="button-indicator"></div>
                                </div>
                            </label>
                        </div>
                    </div>
                    <button class="anim-btn" onclick="toggleAnimMode()" title="Exit animate mode">
                        <div class="loader"></div>
                    </button>
                </div>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="New Board" onclick="newBoard()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></svg></button>
                <button class="tb-icon-btn" title="Save to File" onclick="exportToFile()"><svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M4 2v4h7V2M4 15v-5h9v5" stroke="currentColor" stroke-width="1.2" /></svg></button>
                <button class="tb-icon-btn" title="Load from File" onclick="importFromFile()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 14V6h14v8H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><path d="M2 6V4a1 1 0 011-1h4l2 2h6a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg></button>
            </div>

        </div>
        </div>
    </div>

    <!-- ─────────── SIDE PANEL ─────────── -->
    <div id="side-panel-tag" title="Open side panel"></div>
    <div id="side-panel">
        <button id="side-panel-close" title="Close panel">&times;</button>
        <div id="cp-section">
            <button id="cp-toggle" type="button" aria-expanded="false">
                <span>Charts</span>
                <span class="cp-caret" aria-hidden="true">&#9662;</span>
            </button>
            <div id="cp-list"></div>
        </div>

        <div id="text-controls">
            <button id="btn-add-text" onclick="activateTextMode()" title="Click canvas to place text">Add Text</button>

            <div class="tc-row">
                <label>Font</label>
                <select id="tc-font" onchange="applyTextProperty('fontFamily', this.value)">
                    <option value="system-ui">System UI</option>
                    <option value="serif">Serif</option>
                    <option value="monospace">Monospace</option>
                    <option value="cursive">Cursive</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Times New Roman">Times New Roman</option>
                </select>
            </div>

            <div class="tc-row">
                <label>Color</label>
                <input id="tc-color" type="color" value="#000000" onchange="applyTextProperty('color', this.value)">
            </div>

            <div class="tc-row">
                <label>Size <span id="tc-size-display">32</span>px</label>
                <input id="tc-size" type="range" min="8" max="200" value="32" onchange="applyTextProperty('fontSize', this.value); document.getElementById('tc-size-display').textContent = this.value">
            </div>

            <div class="tc-row">
                <label>Depth (Z)</label>
                <input id="tc-z" type="range" min="-10" max="10" value="0" onchange="applyTextProperty('z', this.value)">
            </div>

            <div class="tc-effects">
                <div class="tc-effect-group">
                    <label>
                        <input type="checkbox" id="tc-shadow-check" onchange="toggleEffectProp('shadow')">
                        Shadow
                    </label>
                    <div class="tc-effect-controls" id="tc-shadow-controls" style="display: none;">
                        <div class="tc-row">
                            <label>Angle</label>
                            <input type="range" min="0" max="360" value="45" onchange="updateShadowAngle(this.value)">
                        </div>
                        <div class="tc-row">
                            <label>Distance</label>
                            <input type="range" min="0" max="20" value="4" onchange="updateShadowDistance(this.value)">
                        </div>
                        <div class="tc-row">
                            <label>Blur</label>
                            <input type="range" min="0" max="30" value="8" onchange="updateShadowBlur(this.value)">
                        </div>
                        <div class="tc-row">
                            <label>Opacity</label>
                            <input type="range" min="0" max="1" step="0.1" value="0.3" onchange="updateShadowOpacity(this.value)">
                        </div>
                    </div>
                </div>

                <div class="tc-effect-group">
                    <label>
                        <input type="checkbox" id="tc-drift-check" onchange="toggleEffectProp('drift')">
                        Drift
                    </label>
                    <div class="tc-effect-controls" id="tc-drift-controls" style="display: none;">
                        <div class="tc-row">
                            <label>Direction</label>
                            <input type="range" min="0" max="360" value="0" onchange="updateDriftDirection(this.value)">
                        </div>
                        <div class="tc-row">
                            <label>Speed</label>
                            <input type="range" min="0.1" max="3" step="0.1" value="1" onchange="updateDriftSpeed(this.value)">
                        </div>
                    </div>
                </div>

                <div class="tc-effect-group">
                    <label>
                        <input type="checkbox" id="tc-random-write-check" onchange="toggleEffectProp('randomWriteOn')">
                        Random Write-On
                    </label>
                    <div class="tc-effect-controls" id="tc-random-controls" style="display: none;">
                        <div class="tc-row">
                            <label>Duration</label>
                            <input type="range" min="0.2" max="5" step="0.1" value="1" onchange="updateRandomWriteDuration(this.value)">
                        </div>
                    </div>
                </div>

                <div class="tc-effect-group">
                    <label>
                        <input type="checkbox" id="tc-slide-up-check" onchange="toggleEffectProp('slideUp')">
                        Slide Up
                    </label>
                </div>
            </div>
        </div>

        <div id="side-panel-dock-zone" title="Drop the toolbar here to dock"></div>
    </div>
    <div id="tb-dock-controls">
        <button id="btn-dock-toggle" onclick="SidePanel.dockToggle()">Dock</button>
        <button id="btn-tuck-toggle" onclick="SidePanel.tuckToggle()">Tuck</button>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item danger" onclick="ctxDo('delete')">Delete</div>
    </div>

    <div id="selection-box"></div>
    <div id="zoom-hud">100%</div>

    <script src="js/state.js?v=9"></script>
    <script src="js/text-layer.js?v=2"></script>
    <script src="js/nodes.js?v=6"></script>
    <script src="js/media.js?v=6"></script>
    <script src="js/malik.js?v=6"></script>
    <script src="js/connections.js?v=7"></script>
    <script src="js/ui.js?v=8"></script>
    <script src="js/sidepanel/sidepanel.js?v=9"></script>
</body>

</html>
