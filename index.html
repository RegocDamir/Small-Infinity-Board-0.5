<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Canvas</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700&family=Roboto:wght@400;700&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f3ebe1;
            --dot-color: #343131;
            --bar-bg: rgba(30, 24, 26, 0.96);
            --bar-border: rgba(255, 255, 255, 0.08);
            --accent: #c8ff00;
            --accent2: #00d4ff;
            --node-border: rgba(255, 255, 255, 0.15);
            --node-bg: rgba(28, 22, 24, 0.97);
            --text: #e8e8e8;
            --muted: #7a6a6e;
            --conn-color: #3e383b;
            --port-bg: #666;
            --port-border: #333;
            --port-hover: #999;
            --dot-icon: var(--muted);
            --tb-hover-bg: rgba(255, 255, 255, 0.06);
            --tb-hover-border: rgba(255, 255, 255, 0.09);
            --tb-active-bg: rgba(253, 253, 253, 0.08);
            --tb-active-border: rgba(253, 253, 253, 0.25);
            --tb-active-glow: 0 0 10px rgba(253, 253, 253, 0.12), 0 0 20px rgba(253, 253, 253, 0.06);
            --tb-icon-active-glow: 0 0 10px rgba(253, 253, 253, 0.12);
            --tb-active-text: #fdfdfd;
            --tb-hover-text: var(--text);
            --placeholder-color: rgba(255, 255, 255, 0.2);
            --ctx-text: var(--text);
            --pulse-color: var(--conn-color);
        }

        body.light {
            --bg: #edddd4;
            --dot-color: #afa38f;
            --node-bg: #197278;
            --bar-bg: rgba(255, 255, 255, 0.92);
            --bar-border: rgba(0, 0, 0, 0.08);
            --conn-color: #3b878c;
            --port-bg: #197278;
            --port-border: #3b878c;
            --port-hover: #2199a1;
            --dot-icon: #0f464a;
            --tb-hover-bg: rgba(0, 110, 255, 0.15);
            --tb-hover-border: rgba(0, 110, 255, 0.5);
            --tb-active-bg: rgba(0, 110, 255, 0.15);
            --tb-active-border: rgba(0, 110, 255, 0.6);
            --tb-active-glow: 0 0 15px rgba(0, 110, 255, 0.4), 0 0 30px rgba(0, 110, 255, 0.2);
            --tb-icon-active-glow: 0 0 15px rgba(0, 110, 255, 0.4);
            --tb-active-text: #006eff;
            --tb-hover-text: #006eff;
            --placeholder-color: #0d383b;
            --ctx-text: #197278;
            --pulse-color: #197278;
        }

        body.light .node-img-area,
        body.light .node-video-area {
            background: #ff751f;
            border: 1.2px solid #c0393f;
        }

        body.light .node-img-area {
            border-style: solid;
        }

        body.light .node-text-input {
            background: #737373;
            border: 1.2px solid #c0393f;
            color: #fff;
        }

        body.light .node-text-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        body {
            background: var(--bg);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'DM Mono', monospace;
            user-select: none;
        }

        #canvas-wrap {
            position: fixed;
            inset: 0;
            overflow: hidden;
            cursor: default;
        }

        #canvas-wrap.panning {
            cursor: grabbing;
        }

        #canvas-wrap.adding {
            cursor: crosshair;
        }

        #dot-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, var(--dot-color) 1.5px, transparent 1.5px);
            background-size: 32px 32px;
            pointer-events: none;
        }

        #scene {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            transform-origin: 0 0;
        }

        /* ── GROUP CONTAINER ── */
        .node-is-group {
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px dashed var(--bar-border);
            box-shadow: none;
            pointer-events: auto;
            cursor: grab;
            z-index: 1;
            padding: 0 14px 14px 14px;
        }

        .node-is-group:active {
            cursor: grabbing;
        }

        .node-is-group .node-body {
            background: #f3ebe1;
            border-radius: 8px;
            margin: 0 4px 4px 4px;
            padding: 4px;
            pointer-events: none;
        }

        .node-is-group>.node-inner {
            pointer-events: none;
        }

        .node-is-group>.node-inner>.node-header {
            pointer-events: auto;
            cursor: grab;
            /* Allow grabbing the group header to move it */
        }

        body.light .node-is-group {
            background: #fdfdfd;
            border: 2px solid #000;
        }

        body.light .node-is-group .node-body {
            background: #f3ebe1;
            border: 2px solid #ff751f;
            border-radius: 8px;
            margin: 0 4px 4px 4px;
            padding: 4px;
        }

        body.light .node-is-group .node-title {
            color: #000;
            font-weight: 700;
        }

        body.light .node-is-group .node-title::placeholder {
            color: rgba(0, 0, 0, 0.5);
        }

        body.light .node-is-group .node-act-btn {
            color: #000;
        }

        body.light .node-act-btn {
            color: #ff751f;
        }

        .node-container-area {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        svg#connections {
            position: absolute;
            top: -10000px;
            left: -10000px;
            width: 20000px;
            height: 20000px;
            pointer-events: none;
            z-index: 10;
        }

        /* ── SELECTION BOX ── */
        #selection-box {
            position: fixed;
            border: 1.5px dashed rgba(0, 110, 255, 0.6);
            background: rgba(0, 110, 255, 0.05);
            pointer-events: none;
            z-index: 2000;
            display: none;
        }

        body.light #selection-box {
            border-color: rgba(0, 110, 255, 0.6);
            background: rgba(0, 110, 255, 0.05);
        }

        /* ── TOOLBAR ── */
        #toolbar {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 1000;
            perspective: 1200px;
        }

        #tb-flipcard {
            transform-style: preserve-3d;
            transition: transform 0.55s cubic-bezier(.65, 0, .35, 1);
            position: relative;
            border-radius: 9px;
        }

        body.anim-mode #tb-flipcard { transform: rotateX(180deg); }

        .tb-face {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 14px;
            border-radius: 9px;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .tb-front {
            background: var(--bar-bg);
            border: 1px solid var(--bar-border);
            backdrop-filter: blur(24px);
            box-shadow: 7px 11px 48px rgba(0, 110, 255, 0.31), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
        }

        body.light .tb-front {
            border: 1px solid #ff751f;
            box-shadow: 0 0 0 1px #ff751f inset, 7px 11px 48px rgba(0, 110, 255, 0.31);
        }

        .tb-back {
            position: absolute;
            inset: 0;
            transform: rotateX(180deg);
            background: rgba(0, 175, 195, 0.92);
            border: 1px solid rgba(0, 220, 235, 0.45);
            backdrop-filter: blur(24px);
            min-width: 100%;
        }

        .tb-back .tb-btn { color: rgb(0, 235, 245); }
        .tb-back .tb-btn:hover { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.5); box-shadow: 0 0 12px rgba(255,255,255,0.25); }
        .tb-back .tb-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.6); box-shadow: 0 0 14px rgba(255,255,255,0.3); }
        .tb-back .tb-icon-btn { color: rgb(0, 235, 245); }
        .tb-back .tb-icon-btn:hover { background: rgba(255,255,255,0.18); color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .tb-back .tb-sep { background: rgba(0, 220, 230, 0.35); }
        .tb-back #tb-logo-b { background-color: rgba(0,0,0,0.08); border-color: rgba(0,240,255,0.2); }

        #tb-logo-b {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            cursor: pointer;
            margin: -6px 3px;
            transition: all 0.15s;
            border: 1px dashed rgba(0, 240, 255, 0.25);
        }
        #tb-logo-b:hover { background-color: rgba(0,0,0,0.15); border-color: rgba(0,240,255,0.5); }
        #tb-logo-b.has-logo { background-color: transparent !important; border-color: transparent !important; }

        .tb-sep {
            width: 1px;
            height: 22px;
            background: var(--bar-border);
            flex-shrink: 0;
            margin: 0 2px;
        }

        .tb-label {
            font-size: 8.5px;
            letter-spacing: 0.16em;
            color: var(--muted);
            text-transform: uppercase;
            padding: 0 2px;
            font-family: 'Syne', sans-serif;
        }

        #tb-logo {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.04);
            border: 1px dashed rgba(255, 255, 255, 0.25);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            flex-shrink: 0;
            cursor: pointer;
            margin: -6px 3px;
            transition: all 0.15s;
        }

        #tb-logo:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.4);
        }

        #tb-logo.has-logo {
            background-color: transparent !important;
            border-color: transparent !important;
        }

        body.light #tb-logo {
            background-color: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.15);
        }

        body.light #tb-logo:hover {
            background-color: rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.3);
        }

        .tb-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'DM Mono', monospace;
            font-size: 8.5px;
            color: var(--muted);
            min-width: 44px;
        }

        .tb-btn:hover {
            background: var(--tb-hover-bg);
            color: var(--tb-hover-text);
            border-color: var(--tb-hover-border);
        }

        .tb-btn.active {
            background: var(--tb-active-bg);
            color: var(--tb-active-text);
            border-color: var(--tb-active-border);
            box-shadow: var(--tb-active-glow);
        }

        .tb-btn svg {
            flex-shrink: 0;
            transform: scale(0.9);
        }
        #btn-kframe { white-space: nowrap; }
        #btn-kframe.kframe-active path {
            fill: #c0393f;
            transition: fill 0.15s;
        }
        #btn-cam-zoom.zoom-active {
            box-shadow: 0 0 7px rgba(255,150,20,0.85), 0 0 22px rgba(255,120,0,0.45);
            border-color: rgba(255,150,20,0.55) !important;
        }
        #btn-cam-zoom.zoom-zoomed {
            box-shadow: 0 0 7px rgba(210,45,45,0.90), 0 0 22px rgba(185,25,25,0.48);
            border-color: rgba(210,45,45,0.55) !important;
        }
        #btn-flip-frame.flip-active {
            box-shadow: 0 0 7px rgba(100,200,255,0.85), 0 0 22px rgba(60,160,255,0.45);
            border-color: rgba(100,180,255,0.55) !important;
        }
        .node-back-face {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            display: none;
            z-index: 12;
            pointer-events: auto;
            padding: 8px;
            cursor: pointer;
        }
        .node.node-flipped .node-inner {
            visibility: hidden;
        }
        .node.node-flipped .node-back-face {
            display: flex;
            align-items: flex-start;
            justify-content: flex-start;
        }
        .node.node-flipped {
            border-width: 2px;
        }

        /* ---- HTML NODE ---- */
        .node-html-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }
        .node-html-code {
            width: 100%;
            height: 100%;
            resize: none;
            background: #141414;
            color: #d4d4d4;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border: none;
            padding: 8px;
            box-sizing: border-box;
            line-height: 1.55;
            outline: none;
        }
        .node-html-frame {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background: #0a0a0a;
            border-radius: 0 0 6px 6px;
        }
        .node-html-toggle {
            font-size: 11px;
            line-height: 1;
            padding: 2px 5px !important;
        }

        .tb-icon-btn {
            background: none;
            border: 1px solid transparent;
            border-radius: 5px;
            padding: 0;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.15s;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
        }

        .tb-icon-btn:hover {
            background: var(--tb-hover-bg);
            color: var(--tb-hover-text);
        }

        .tb-icon-btn:active {
            color: var(--tb-active-text);
            box-shadow: var(--tb-icon-active-glow);
        }

        #tb-drag-handle {
            width: 16px;
            height: 28px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.15);
            flex-shrink: 0;
        }

        #tb-drag-handle:active {
            cursor: grabbing;
        }

        /* ── THEME / ANIM STACK ── */
        .tb-theme-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 0 6px;
            flex-shrink: 0;
        }
        .tb-theme-stack .theme-switch-wrap { transition: visibility 0s linear 0.48s; }
        body.anim-mode .tb-theme-stack .theme-switch-wrap { visibility: hidden; pointer-events: none; transition: visibility 0s linear 0s; }
        body.light .switch-button .switch-outer { border-color: #ff751f; }

        /* Uiverse theme switch (by Admin12121), scaled down */
        .theme-switch-wrap {
            width: 34px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: -24px;
            transform: translateY(1px);
        }
        .theme-switch-wrap .switch-button {
            transform: scale(0.28);
            transform-origin: center;
        }
        .switch-button {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            height: 55px;
        }
        .switch-button .switch-outer {
            height: 100%;
            background: transparent;
            width: 118px;
            border-radius: 150px;
            box-shadow: 7px 3px 6px -9px #403f4e;
            border: 2.14px solid #ffffff;
            padding: 4.2px;
            box-sizing: border-box;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            display: block;
        }
        .switch-button .switch-outer input[type="checkbox"] {
            opacity: 0;
            appearance: none;
            position: absolute;
        }
        .switch-button .switch-outer .button-toggle {
            height: 38px;
            width: 38px;
            background: linear-gradient(#9694a8, #6a6878);
            border-radius: 100%;
            box-shadow: inset 0px 5px 4px 0px #b5b3c4;
            position: relative;
            z-index: 2;
            transition: left 0.3s ease-in;
            left: 0;
            top: 1.07px;
        }
        .switch-button .switch-outer input[type="checkbox"]:checked + .button .button-toggle { left: 58%; }
        .switch-button .switch-outer input[type="checkbox"]:checked + .button .button-indicator {
            animation: indicator 0.8s forwards;
        }
        .switch-button .switch-outer .button {
            width: 100%;
            height: 100%;
            display: flex;
            position: relative;
            justify-content: space-between;
        }
        .switch-button .switch-outer .button-indicator {
            height: 35px;
            width: 35px;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 50%;
            border: 9px solid #0cc0df;
            box-sizing: border-box;
            right: 3px;
            position: relative;
        }
        @keyframes indicator {
            0%   { opacity: 1; }
            30%  { opacity: 0; }
            100% { opacity: 1; border: 9px solid #ff751f; left: -64%; }
        }

        /* Animate-mode loader button (Uiverse-style wave) */
        .anim-btn {
            appearance: none;
            -webkit-appearance: none;
            padding: 0;
            border: none;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 25px;
            transition: transform 0.15s ease;
        }
        .anim-btn:hover { transform: scale(1.12); }
        .anim-btn:focus { outline: none; }
        .loader {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 12px 8px #ff751f inset, 0 1px 6px #ff751f;
            overflow: hidden;
        }
        .loader:before,
        .loader:after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 45%;
            top: -40%;
            background-color: #fc66;
            animation: wave 5s linear infinite;
        }
        .loader:before {
            border-radius: 20%;
            background: #ff3131;
            animation: wave 5s linear infinite;
        }
        @keyframes wave {
            0%   { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        body.light #tb-drag-handle, body.light .tb-drag-handle-b {
            color: rgba(0, 0, 0, 0.35);
        }


        .tb-drag-handle-b {
            width: 16px;
            height: 28px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0, 40, 50, 0.4);
            flex-shrink: 0;
        }
        .tb-drag-handle-b:active { cursor: grabbing; }
