<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Small Infinity 0.3</title>
    <link rel="icon" type="image/svg+xml" href="Icons SVGs/favicon.svg">
    <link rel="stylesheet" href="css/01-base.css">
    <link rel="stylesheet" href="css/02-path-selection.css">
    <link rel="stylesheet" href="css/03-toolbar.css?v=4">
    <link rel="stylesheet" href="css/04-nodes-media-connections.css">
    <link rel="stylesheet" href="css/05-side-panel-charts-docking.css?v=4">
    <link rel="stylesheet" href="css/06-text-camera-controls.css?v=6">
    <link rel="stylesheet" href="css/07-responsive.css">
</head>

<body>

    <div id="canvas-wrap">
        <div id="dot-grid"></div>
        <div id="anim-bg"></div>
        <div id="scene">
            <svg id="connections">
            </svg>
        </div>
    </div>

    <div id="toolbar">
        <div id="tb-rotate-wrapper">
        <div id="tb-flipcard">

            <!-- ═══ FRONT FACE ═══ -->
            <div class="tb-face tb-front">
                <div id="tb-drag-handle" data-tb-fixed>
                    <svg width="10" height="18" viewBox="0 0 10 18" fill="currentColor">
                        <circle cx="1.5" cy="3" r="1.2" /><circle cx="1.5" cy="9" r="1.2" /><circle cx="1.5" cy="15" r="1.2" />
                        <circle cx="8.5" cy="3" r="1.2" /><circle cx="8.5" cy="9" r="1.2" /><circle cx="8.5" cy="15" r="1.2" />
                    </svg>
                </div>
                <div id="tb-logo" class="tb-slot" data-tb-slot="logo" title="Right click to upload PNG logo"></div>
                <button class="tb-btn tb-slot" id="btn-text" data-tb-slot="text" onclick="setAddMode('text')" title="Add text node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="3.5" width="13" height="1.8" rx="0.9" fill="currentColor" /><rect x="2" y="7.5" width="9" height="1.8" rx="0.9" fill="currentColor" /><rect x="2" y="11.5" width="11" height="1.8" rx="0.9" fill="currentColor" /></svg>
                    TEXT
                </button>
                <button class="tb-btn tb-slot" id="btn-image" data-tb-slot="image" onclick="setAddMode('image')" title="Add image node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2.5" width="13" height="12" rx="2.5" stroke="currentColor" stroke-width="1.4" /><circle cx="6" cy="6.5" r="1.4" fill="currentColor" /><path d="M2 11.5l3.5-3 3 2.5 2-1.5 4.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" /></svg>
                    IMAGE
                </button>
                <button class="tb-btn tb-slot" id="btn-video" data-tb-slot="video" onclick="setAddMode('video')" title="Add video or audio node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="1.5" y="3.5" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M11.5 7l4-2v7l-4-2V7z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg>
                    VIDEO
                </button>
                <button class="tb-btn tb-slot" id="btn-malik" data-tb-slot="malik" onclick="setAddMode('malik')" title="Add Malik node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><path d="M8.5 2C8.5 2 9.5 6 13 6C9.5 6 8.5 10 8.5 10C8.5 10 7.5 6 4 6C7.5 6 8.5 2 8.5 2Z" fill="currentColor" /><path d="M13.5 10C13.5 10 14 12 15.5 12C14 12 13.5 14 13.5 14C13.5 14 13 12 11.5 12C13 12 13.5 10 13.5 10Z" fill="currentColor" /><path d="M4.5 12C4.5 12 5 13.5 6.5 13.5C5 13.5 4.5 15 4.5 15C4.5 15 4 13.5 2.5 13.5C4 13.5 4.5 12 4.5 12Z" fill="currentColor" /></svg>
                    MALIK
                </button>
                <button class="tb-btn tb-slot" id="btn-group" data-tb-slot="group" onclick="setAddMode('group')" title="Create a draggable group by click-and-drag (on the scroll wheel) around the nodes you want to group.">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2.5" y="2.5" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2 2" /><path d="M6 6h5v5H6z" fill="currentColor" opacity="0.5" /></svg>
                    GROUP
                </button>
                <button class="tb-btn tb-slot" id="btn-youtube" data-tb-slot="youtube" onclick="setAddMode('youtube')" title="Add YouTube embed node — paste a video URL to embed and play it">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="1.5" y="4" width="14" height="9" rx="2.8" fill="currentColor" opacity="0.88"/><path d="M7 6.5l4.5 2.5L7 11.5V6.5Z" fill="black"/></svg>
                    EMBED YT
                </button>
                <div class="tb-sep tb-slot" data-tb-slot="sep-1"></div>
                <div class="tb-slot tb-slot-group" data-tb-slot="group-nav">
                    <button class="tb-icon-btn" title="Reset view (Home)" onclick="resetView()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L9 4.5L15 9V14H3V9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M7.5 14V11.5C7.5 10.95 7.95 10.5 8.5 10.5H9.5C10.05 10.5 10.5 10.95 10.5 11.5V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                    <div class="tb-theme-stack">
                        <label class="theme-pill-wrap theme-switch" title="Toggle dark / light">
                            <input type="checkbox" onchange="toggleTheme()">
                            <span class="theme-pill"></span>
                        </label>
                        <button class="anim-btn" onclick="toggleAnimMode()" title="Toggle animate mode">
                            <span class="anim-radio"></span>
                        </button>
                    </div>
                </div>
                <div class="tb-sep tb-slot" data-tb-slot="sep-2"></div>
                <div class="tb-slot tb-slot-group" data-tb-slot="group-files">
                    <button class="tb-icon-btn" title="New Board" onclick="newBoard()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></svg></button>
                    <button class="tb-icon-btn" title="Save to File" onclick="exportToFile()"><svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M4 2v4h7V2M4 15v-5h9v5" stroke="currentColor" stroke-width="1.2" /></svg></button>
                    <button class="tb-icon-btn" title="Load from File" onclick="importFromFile()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 14V6h14v8H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><path d="M2 6V4a1 1 0 011-1h4l2 2h6a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg></button>
                </div>
            </div>

            <!-- ═══ BACK FACE (ANIMATE) ═══ -->
            <div class="tb-face tb-back">
                <div id="tb-drag-handle-b" class="tb-drag-handle-b">
                    <svg width="10" height="18" viewBox="0 0 10 18" fill="currentColor">
                        <circle cx="1.5" cy="3" r="1.2" /><circle cx="1.5" cy="9" r="1.2" /><circle cx="1.5" cy="15" r="1.2" />
                        <circle cx="8.5" cy="3" r="1.2" /><circle cx="8.5" cy="9" r="1.2" /><circle cx="8.5" cy="15" r="1.2" />
                    </svg>
                </div>
                <div id="tb-logo-b"></div>
                <button class="tb-btn" id="btn-stack" onclick="setAddMode('stack')" title="Add stack node">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <rect x="1.5" y="6" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/>
                        <rect x="3" y="3.5" width="11" height="3" rx="1.5" stroke="currentColor" stroke-width="1.2" opacity="0.65"/>
                        <rect x="4.5" y="1.5" width="8" height="2.5" rx="1.2" stroke="currentColor" stroke-width="1.1" opacity="0.35"/>
                    </svg>
                    STACK
                </button>
                <button class="tb-btn" id="btn-kframe" title="K-Frame: record &amp; restore node positions" onclick="toggleKFrame()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <!-- Single large hollow diamond, standard keyframe marker -->
                        <path d="M8.5 1L16 8.5L8.5 16L1 8.5Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
                    </svg>
                    K-FRAME
                </button>
                <button class="tb-btn" id="btn-cam-zoom" title="Zoom to node" onclick="toggleCamZoom()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <circle cx="7.5" cy="7.5" r="4.5" stroke="currentColor" stroke-width="1.4"/>
                        <path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M7.5 5.5v4M5.5 7.5h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    ZOOM
                </button>
                <button class="tb-btn" id="btn-flip-frame" title="Flip node" onclick="toggleFlipMode()">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <!-- Left triangle: pointing RIGHT, like a play button -->
                        <path d="M1.5 3.5L7.5 8.5L1.5 13.5Z" fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
                        <!-- Right triangle: pointing LEFT, mirrored, dimmer -->
                        <path d="M15.5 3.5L9.5 8.5L15.5 13.5Z" fill="currentColor" opacity="0.4" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
                        <!-- Center dashed dividing line -->
                        <line x1="8.5" y1="3" x2="8.5" y2="14" stroke="currentColor" stroke-width="1" stroke-dasharray="1.5 2" stroke-linecap="round"/>
                    </svg>
                    FLIP
                </button>
                <button class="tb-btn" id="btn-html" title="HTML node" onclick="setAddMode('html')">
                    <svg width="17" height="17" viewBox="0 0 17 17" fill="none">
                        <path d="M5 4L1.5 8.5L5 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 4L15.5 8.5L12 13" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 2.5L7 14.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    </svg>
                    HTML
                </button>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="Reset view (Home)" onclick="resetView()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M3 9L9 4.5L15 9V14H3V9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/><path d="M7.5 14V11.5C7.5 10.95 7.95 10.5 8.5 10.5H9.5C10.05 10.5 10.5 10.95 10.5 11.5V14" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                <div class="tb-theme-stack">
                    <label class="theme-pill-wrap theme-switch" title="Toggle dark / light">
                        <input type="checkbox" onchange="toggleTheme()">
                        <span class="theme-pill"></span>
                    </label>
                    <button class="anim-btn" onclick="toggleAnimMode()" title="Exit animate mode">
                        <span class="anim-radio"></span>
                    </button>
                </div>
                <div class="tb-sep"></div>
                <button class="tb-icon-btn" title="New Board" onclick="newBoard()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" /></svg></button>
                <button class="tb-icon-btn" title="Save to File" onclick="exportToFile()"><svg width="17" height="17" viewBox="0 0 17 17" fill="none"><rect x="2" y="2" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4" /><path d="M4 2v4h7V2M4 15v-5h9v5" stroke="currentColor" stroke-width="1.2" /></svg></button>
                <button class="tb-icon-btn" title="Load from File" onclick="importFromFile()"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 14V6h14v8H2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /><path d="M2 6V4a1 1 0 011-1h4l2 2h6a1 1 0 011 1v2" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" /></svg></button>
            </div>

        </div>
        </div>
    </div>

    <!-- ─────────── SIDE PANEL ─────────── -->
    <div id="side-panel-tag" title="Open side panel"></div>
    <div id="kshortcuts-panel" style="display:none">
        <div id="kshortcuts-header">
            <span id="kshortcuts-title">Keyboard Shortcuts</span>
            <button id="kshortcuts-close" onclick="toggleKShortcuts()">&times;</button>
        </div>
        <div id="kshortcuts-body"></div>
    </div>
    <div id="side-panel">
        <div id="sp-top-bar">
            <button id="side-panel-close" class="sp-frame-btn" title="Close panel">&times;</button>
            <button id="btn-kshortcuts" class="sp-frame-btn" onclick="toggleKShortcuts()">K-shortcuts</button>
            <button class="sp-frame-btn sp-z-btn" onclick="adjustSidePanelZ(1,this)" title="Move selected item forward">
                <span>Z-axis</span>
                <img src="Icons SVGs/triangle.svg" alt="" draggable="false">
            </button>
            <button class="sp-frame-btn sp-z-btn is-down" onclick="adjustSidePanelZ(-1,this)" title="Move selected item backward">
                <span>Z-axis</span>
                <img src="Icons SVGs/triangle.svg" alt="" draggable="false">
            </button>
        </div>
        <div id="cp-section">
            <button id="cp-toggle" type="button" aria-expanded="false">
                <span>Charts</span>
                <span class="cp-caret" aria-hidden="true"></span>
            </button>
            <div id="cp-list"></div>
        </div>

        <button id="btn-add-text" onclick="activateTextMode()">Add text</button>

        <div id="text-controls">
            <div class="tc-panel">
                <div class="tc-field">
                    <label for="tc-content">Content</label>
                    <textarea id="tc-content" placeholder="Select text on the canvas" oninput="applyTextContent(this.value)" onmousedown="event.stopPropagation()"></textarea>
                </div>

                <div class="tc-grid">
                    <div class="tc-field">
                        <label for="tc-font">Font</label>
                        <select id="tc-font" onchange="applyTextProperty('fontFamily', this.value)">
                            <option value="system-ui">System UI</option>
                            <option value="serif">Serif</option>
                            <option value="monospace">Monospace</option>
                            <option value="cursive">Cursive</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Lora">Lora</option>
                            <option value="Roboto Local">Roboto</option>
                        </select>
                    </div>
                    <div class="tc-field">
                        <label for="tc-color">Color</label>
                        <input id="tc-color" type="color" value="#000000" onchange="applyTextProperty('color', this.value)">
                    </div>
                </div>

                <div class="tc-row">
                    <label>Size</label>
                    <input id="tc-size" type="range" min="8" max="200" value="32" style="--fill:12.5%" oninput="applyTextProperty('fontSize', this.value); this.style.setProperty('--fill', ((this.value - this.min) / (this.max - this.min) * 100) + '%')">
                    <span class="tc-inline-value" id="tc-size-display">32</span>
                    <span class="tc-stepper" aria-label="Adjust text size">
                        <button type="button" id="tc-size-down" title="Decrease size"></button>
                        <button type="button" id="tc-size-up" title="Increase size"></button>
                    </span>
                </div>

                <div class="tc-effects">
                    <div class="tc-group-title">Effects</div>
                    <div class="tc-effect-group">
                        <div class="tc-effect-row" onclick="toggleShadowPanel()">
                            <input type="checkbox" id="tc-shadow-check" onclick="event.stopPropagation()" onchange="toggleEffectProp('shadow')">
                            Shadow
                        </div>
                        <div class="tc-effect-controls" id="tc-shadow-controls">
                        <div class="tc-row">
                            <label>Color</label>
                            <input id="tc-shadow-color" type="color" value="#ffffff" onchange="updateShadowColor(this.value)">
                        </div>
                        <div class="tc-row">
                            <label>Angle</label>
                            <input id="tc-shadow-angle" type="range" min="0" max="360" value="45" oninput="updateShadowAngle(this.value); syncSliderFill(this)">
                        </div>
                        <div class="tc-row">
                            <label>Distance</label>
                            <input id="tc-shadow-distance" type="range" min="0" max="40" value="10" oninput="updateShadowDistance(this.value); syncSliderFill(this)">
                        </div>
                        <div class="tc-row">
                            <label>Blur</label>
                            <input id="tc-shadow-blur" type="range" min="0" max="60" value="18" oninput="updateShadowBlur(this.value); syncSliderFill(this)">
                        </div>
                        <div class="tc-row">
                            <label>Opacity</label>
                            <input id="tc-shadow-opacity" type="range" min="0" max="1" step="0.05" value="0.75" oninput="updateShadowOpacity(this.value); syncSliderFill(this)">
                        </div>
                    </div>
                    </div>

                    <div class="tc-effect-group">
                        <div class="tc-effect-row" onclick="toggleDriftPanel()">
                            <input type="checkbox" id="tc-drift-check" onclick="event.stopPropagation()" onchange="toggleEffectProp('drift')">
                            Drift
                        </div>
                        <div class="tc-effect-controls" id="tc-drift-controls">
                        <div class="tc-row">
                            <label>Direction</label>
                            <div class="tc-direction-buttons" id="tc-drift-direction">
                                <label class="tc-direction-button" title="Left to right"><input type="radio" name="tc-drift-direction" value="ltr" onchange="updateDriftDirection(this.value)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(90deg)"><path d="M9 19a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-6a1 1 0 0 1 1-1h3.293a.707.707 0 0 0 .5-1.207l-7.086-7.086a1 1 0 0 0-1.414 0l-7.086 7.086a.707.707 0 0 0 .5 1.207H8a1 1 0 0 1 1 1z"/></svg></label>
                                <label class="tc-direction-button" title="Right to left"><input type="radio" name="tc-drift-direction" value="rtl" onchange="updateDriftDirection(this.value)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(-90deg)"><path d="M9 19a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-6a1 1 0 0 1 1-1h3.293a.707.707 0 0 0 .5-1.207l-7.086-7.086a1 1 0 0 0-1.414 0l-7.086 7.086a.707.707 0 0 0 .5 1.207H8a1 1 0 0 1 1 1z"/></svg></label>
                                <label class="tc-direction-button" title="Top to bottom"><input type="radio" name="tc-drift-direction" value="ttb" onchange="updateDriftDirection(this.value)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="transform:rotate(180deg)"><path d="M9 19a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-6a1 1 0 0 1 1-1h3.293a.707.707 0 0 0 .5-1.207l-7.086-7.086a1 1 0 0 0-1.414 0l-7.086 7.086a.707.707 0 0 0 .5 1.207H8a1 1 0 0 1 1 1z"/></svg></label>
                                <label class="tc-direction-button" title="Bottom to top"><input type="radio" name="tc-drift-direction" value="btt" onchange="updateDriftDirection(this.value)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 19a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1v-6a1 1 0 0 1 1-1h3.293a.707.707 0 0 0 .5-1.207l-7.086-7.086a1 1 0 0 0-1.414 0l-7.086 7.086a.707.707 0 0 0 .5 1.207H8a1 1 0 0 1 1 1z"/></svg></label>
                            </div>
                        </div>
                        <div class="tc-row">
                            <label>Speed</label>
                            <input id="tc-drift-speed" type="range" min="1" max="100" step="1" value="20" oninput="updateDriftSpeed(this.value); syncSliderFill(this)">
                        </div>
                    </div>
                    </div>

                </div>
            </div>
        </div>

        <hr class="sp-section-divider">

        <div id="camera-controls">
            <div class="tc-group-title">Camera</div>
            <button id="cam-draw-path" onclick="toggleCameraPathDraw()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:5px;flex-shrink:0"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/></svg>Draw Camera Path</button>
            <div class="cam-actions">
                <button onclick="playCameraPath()">Play</button>
                <button onclick="pausePlayCameraPath()">Pause/Play</button>
                <button onclick="stopCameraPath()">Stop</button>
                <button onclick="finishCameraPathDraw()">Finish</button>
                <button id="cam-path-visibility" class="cam-visibility-toggle" type="button" aria-pressed="true" title="Show camera path" onclick="toggleCameraPathVisibility()">
                    <img class="cam-vis-eye" src="Icons SVGs/eye.svg" alt="">
                    <span class="cam-vis-switch" aria-hidden="true"></span>
                    <img class="cam-vis-eye-closed" src="Icons SVGs/eye-closed.svg" alt="">
                </button>
                <button onclick="clearCameraPath()"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px;flex-shrink:0"><circle cx="6" cy="19" r="3"/><path d="M9 19h8.5c.4 0 .9-.1 1.3-.2"/><path d="M5.2 5.2A3.5 3.53 0 0 0 6.5 12H12"/><path d="m2 2 20 20"/><path d="M21 15.3a3.5 3.5 0 0 0-3.3-3.3"/><path d="M15 5h-4.3"/><circle cx="18" cy="5" r="3"/></svg>Clear</button>
            </div>
            <div class="cam-field">
                <label>Camera Speed</label>
                <div class="cam-speed-wrap">
                    <img class="cam-speed-icon cam-speed-snail" src="Icons SVGs/snail.svg" alt="">
                    <input id="cam-speed" type="range" min="40" max="360" value="120" oninput="updateCameraPathSpeed(this.value)">
                    <img class="cam-speed-icon cam-speed-rabbit" src="Icons SVGs/rabbit.svg" alt="">
                </div>
            </div>
            <div class="cam-extra-row">
                <button id="cam-add-ramp" onclick="toggleCameraPathRampPlace()">Add Speed Ramp</button>
                <label class="cam-mode-row">
                    <input id="cam-turns" type="checkbox" onchange="updateCameraPathTurns(this.checked)">
                    Turn With Path
                </label>
            </div>
            <div class="cam-field">
                <label>Ramp Speed</label>
                <div class="cam-speed-wrap cam-ramp-speed-wrap">
                    <img class="cam-speed-icon cam-speed-snail" src="Icons SVGs/snail.svg" alt="">
                    <input id="cam-ramp-value" type="range" min="0.2" max="3" step="0.01" value="1.5" disabled oninput="updateCameraPathRampValue(this.value)">
                    <img class="cam-speed-icon cam-speed-rabbit" src="Icons SVGs/rabbit.svg" alt="">
                </div>
            </div>
        </div>

        <div id="side-panel-dock-zone" title="Drop the toolbar here to dock"></div>
    </div>
    <div id="tb-dock-controls">
        <button id="btn-dock-toggle" onclick="SidePanel.dockToggle()">Dock</button>
        <button id="btn-tuck-toggle" onclick="SidePanel.tuckToggle()">Tuck</button>
    </div>

    <div id="ctx-menu">
        <div class="ctx-item danger" onclick="ctxDo('delete')">Delete</div>
