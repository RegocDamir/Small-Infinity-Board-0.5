<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Roboto',sans-serif;padding:20px;color:rgba(255,255,255,0.85);display:flex;flex-direction:column;align-items:center}
h3{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;align-self:flex-start}
</style></head><body>
<h3 id="ttl">Data Gata</h3>
<svg id="svg" width="210" height="210" viewBox="0 0 210 210"></svg>
<script>

const COLORS=['#6FA289','#00B09A','#2B79E0','#E87820','#E84040','#4DC547','#9B59B6','#F5F0D8'];

function getMyId(){try{const me=window.frameElement;if(!me)return null;const n=me.closest('[id^="node-"]');return n?n.id.replace('node-',''):null;}catch(e){return null;}}

function readController(){
  // Strategy 1: read via connections + contentDocument
  try{
    const myId=getMyId();
    if(myId){
      const conns=(typeof connections!=='undefined'?connections:[])||(window.parent&&window.parent.connections)||[];
      for(const c of conns){
        if(c.from!==myId&&c.to!==myId)continue;
        const oid=c.from===myId?c.to:c.from;
        const oNode=window.parent.document.getElementById('node-'+oid);
        const frame=oNode&&oNode.querySelector('.node-html-frame');
        const doc=frame&&(frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document));
        const el=doc&&doc.querySelector('.dc-data');
        if(el&&el.value){try{return JSON.parse(el.value);}catch(e){}}
      }
    }
  }catch(e){}
  // Strategy 2: broadcast global
  try{if(window.parent&&window.parent._DC_DATA)return window.parent._DC_DATA;}catch(e){}
  return null;
}

let _lastData=null;
function poll(){
  const d=readController();
  const s=JSON.stringify(d);
  const prev=JSON.stringify(_lastData);
  if(s!==prev){_lastData=d;render();}
}
setInterval(poll,120);
try{window.parent.addEventListener('dc:update',()=>{const d=readController();if(d){_lastData=d;render();}});}catch(e){}

function getRows(){const c=readController();if(c&&c.rows&&c.rows.length){const mx=Math.max(...c.rows.map(r=>r.a))||1;return c.rows.slice(0,6).map((r,i)=>({l:r.l,v:Math.round(r.a/mx*100),col:COLORS[i%COLORS.length]}));}return[{l:'Alpha',v:94},{l:'Beta',v:82},{l:'Gamma',v:76},{l:'Delta',v:52},{l:'Epsilon',v:48}].map((d,i)=>({...d,col:COLORS[i%COLORS.length]}));}
function render(){const rows=getRows();const c=readController();if(c&&c.title)document.getElementById('ttl').textContent=c.title;const cx=105,cy=105;const svg=document.getElementById('svg');svg.innerHTML='';rows.forEach((r,i)=>{const rad=88-i*16;const circ=2*Math.PI*rad;const filled=(r.v/100)*circ;const tr=document.createElementNS('http://www.w3.org/2000/svg','circle');tr.setAttribute('cx',cx);tr.setAttribute('cy',cy);tr.setAttribute('r',rad);tr.setAttribute('fill','none');tr.setAttribute('stroke','rgba(255,255,255,0.06)');tr.setAttribute('stroke-width','11');svg.appendChild(tr);const fi=document.createElementNS('http://www.w3.org/2000/svg','circle');fi.setAttribute('cx',cx);fi.setAttribute('cy',cy);fi.setAttribute('r',rad);fi.setAttribute('fill','none');fi.setAttribute('stroke',r.col);fi.setAttribute('stroke-width','11');fi.setAttribute('stroke-linecap','round');fi.setAttribute('stroke-dasharray',`${filled} ${circ}`);fi.setAttribute('stroke-dashoffset',filled);fi.setAttribute('transform',`rotate(-90 ${cx} ${cy})`);fi.style.transition=`stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1) ${i*0.1}s`;fi.style.opacity='0';fi.style.filter=`drop-shadow(0 0 4px ${r.col}66)`;svg.appendChild(fi);svg.innerHTML+=`<text x="${cx-rad-7}" y="${cy+4}" text-anchor="end" font-size="9" font-family="Roboto" fill="rgba(255,255,255,0.35)">${r.l}</text>`;svg.innerHTML+=`<text x="${cx+rad+7}" y="${cy+4}" font-size="10" font-family="Roboto" font-weight="500" fill="${r.col}">${r.v}%</text>`;});setTimeout(()=>svg.querySelectorAll('circle[stroke-dasharray]').forEach(c=>{c.style.strokeDashoffset='0';c.style.opacity='1';}),40);}
render();
</script></body></html>
