<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Roboto',sans-serif;padding:20px;color:rgba(255,255,255,0.85);display:flex;gap:20px;align-items:center}
h3{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:14px}
.legend{display:flex;flex-direction:column;gap:7px}
.leg{display:flex;align-items:center;gap:7px;font-size:10px;color:rgba(255,255,255,0.45)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
</style></head><body>
<div><h3 id="ttl">Data Gata</h3><svg width="160" height="160" viewBox="0 0 160 160" id="pie"></svg></div>
<div class="legend" id="leg"></div>
<script>

const COLORS=['#6FA289','#00B09A','#2B79E0','#E87820','#E84040','#4DC547','#9B59B6','#F5F0D8'];

function getMyId(){try{const me=window.frameElement;if(!me)return null;const n=me.closest('[id^="node-"]');return n?n.id.replace('node-',''):null;}catch(e){return null;}}

function readController(){
  // Strategy 1: read via connections + contentDocument
  try{
    const myId=getMyId();
    if(myId){
      const conns=(typeof connections!=='undefined'?connections:[])||(window.parent&&window.parent.connections)||[];
      for(const c of conns){
        if(c.from!==myId&&c.to!==myId)continue;
        const oid=c.from===myId?c.to:c.from;
        const oNode=window.parent.document.getElementById('node-'+oid);
        const frame=oNode&&oNode.querySelector('.node-html-frame');
        const doc=frame&&(frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document));
        const el=doc&&doc.querySelector('.dc-data');
        if(el&&el.value){try{return JSON.parse(el.value);}catch(e){}}
      }
    }
  }catch(e){}
  // Strategy 2: broadcast global
  try{if(window.parent&&window.parent._DC_DATA)return window.parent._DC_DATA;}catch(e){}
  return null;
}

let _lastData=null;
function poll(){
  const d=readController();
  const s=JSON.stringify(d);
  const prev=JSON.stringify(_lastData);
  if(s!==prev){_lastData=d;render();}
}
setInterval(poll,120);
try{window.parent.addEventListener('dc:update',()=>{const d=readController();if(d){_lastData=d;render();}});}catch(e){}

function getRows(){const c=readController();if(c&&c.rows&&c.rows.length)return c.rows.map((r,i)=>({l:r.l,v:r.a,col:COLORS[i%COLORS.length]}));return[{l:'Alpha',v:34},{l:'Beta',v:22},{l:'Gamma',v:18},{l:'Delta',v:15},{l:'Other',v:11}].map((d,i)=>({...d,col:COLORS[i%COLORS.length]}));}
function render(){const rows=getRows();const c=readController();if(c&&c.title)document.getElementById('ttl').textContent=c.title;const total=rows.reduce((s,r)=>s+r.v,0)||1;let ang=0;const pie=document.getElementById('pie');const leg=document.getElementById('leg');pie.innerHTML='';leg.innerHTML='';rows.forEach((r,i)=>{const sw=(r.v/total)*360;const a1=(ang-90)*Math.PI/180;const a2=(ang+sw-90)*Math.PI/180;const lg=sw>180?1:0;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M80,80 L${80+70*Math.cos(a1)},${80+70*Math.sin(a1)} A70,70 0 ${lg},1 ${80+70*Math.cos(a2)},${80+70*Math.sin(a2)} Z`);p.setAttribute('fill',r.col);p.setAttribute('stroke','#000');p.setAttribute('stroke-width','1.5');p.style.opacity='0';p.style.transition=`opacity 0.4s ease ${i*0.1}s`;pie.appendChild(p);leg.innerHTML+=`<div class="leg"><div class="dot" style="background:${r.col}"></div>${r.l}</div>`;ang+=sw;});setTimeout(()=>pie.querySelectorAll('path').forEach(p=>p.style.opacity='1'),40);}
render();
</script></body></html>
