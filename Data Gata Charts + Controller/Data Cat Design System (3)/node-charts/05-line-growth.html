<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Roboto',sans-serif;padding:20px;color:rgba(255,255,255,0.85)}
h3{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:16px}
svg{overflow:visible;display:block}
</style></head><body>
<h3 id="ttl">Data Gata</h3>
<svg id="svg" width="100%" height="150" viewBox="0 0 480 140"></svg>
<script>

const COLORS=['#6FA289','#00B09A','#2B79E0','#E87820','#E84040','#4DC547','#9B59B6','#F5F0D8'];

function getMyId(){try{const me=window.frameElement;if(!me)return null;const n=me.closest('[id^="node-"]');return n?n.id.replace('node-',''):null;}catch(e){return null;}}

function readController(){
  // Strategy 1: read via connections + contentDocument
  try{
    const myId=getMyId();
    if(myId){
      const conns=(typeof connections!=='undefined'?connections:[])||(window.parent&&window.parent.connections)||[];
      for(const c of conns){
        if(c.from!==myId&&c.to!==myId)continue;
        const oid=c.from===myId?c.to:c.from;
        const oNode=window.parent.document.getElementById('node-'+oid);
        const frame=oNode&&oNode.querySelector('.node-html-frame');
        const doc=frame&&(frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document));
        const el=doc&&doc.querySelector('.dc-data');
        if(el&&el.value){try{return JSON.parse(el.value);}catch(e){}}
      }
    }
  }catch(e){}
  // Strategy 2: broadcast global
  try{if(window.parent&&window.parent._DC_DATA)return window.parent._DC_DATA;}catch(e){}
  return null;
}

let _lastData=null;
function poll(){
  const d=readController();
  const s=JSON.stringify(d);
  const prev=JSON.stringify(_lastData);
  if(s!==prev){_lastData=d;render();}
}
setInterval(poll,120);
try{window.parent.addEventListener('dc:update',()=>{const d=readController();if(d){_lastData=d;render();}});}catch(e){}

function getRows(){const c=readController();if(c&&c.rows&&c.rows.length)return c.rows.map(r=>({l:r.l,v:r.a}));return[{l:'Jan',v:12},{l:'Feb',v:21},{l:'Mar',v:18},{l:'Apr',v:34},{l:'May',v:42},{l:'Jun',v:58}];}
function render(){const rows=getRows();const c=readController();if(c&&c.title)document.getElementById('ttl').textContent=c.title;const svg=document.getElementById('svg');const vals=rows.map(r=>r.v);const labels=rows.map(r=>r.l);const W=480,H=110,pad={l:30,r:8,t:6,b:22};const maxV=Math.max(...vals)||1;const xs=i=>pad.l+(i/(vals.length-1||1))*(W-pad.l-pad.r);const ys=v=>pad.t+H*(1-v/maxV);svg.innerHTML=`<defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6FA289" stop-opacity="0.2"/><stop offset="100%" stop-color="#6FA289" stop-opacity="0"/></linearGradient></defs>`;[0,.5,1].forEach(f=>{const y=pad.t+H*(1-f);svg.innerHTML+=`<line x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}" stroke="rgba(255,255,255,0.05)"/>`;svg.innerHTML+=`<text x="0" y="${y+4}" font-size="8" font-family="Roboto" fill="rgba(255,255,255,0.25)">${Math.round(f*maxV)}</text>`;});labels.forEach((l,i)=>svg.innerHTML+=`<text x="${xs(i)}" y="${pad.t+H+16}" text-anchor="middle" font-size="8" font-family="Roboto" fill="rgba(255,255,255,0.25)">${l}</text>`);const pts=vals.map((v,i)=>`${xs(i)},${ys(v)}`).join('L');svg.innerHTML+=`<path d="M${pts}L${xs(vals.length-1)},${pad.t+H}L${xs(0)},${pad.t+H}Z" fill="url(#ag)" opacity="0" style="transition:opacity 0.8s ease 0.3s"/>`;svg.innerHTML+=`<path d="M${pts}" fill="none" stroke="#6FA289" stroke-width="2" stroke-dasharray="3000" stroke-dashoffset="3000" style="transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)"/>`;vals.forEach((v,i)=>svg.innerHTML+=`<circle cx="${xs(i)}" cy="${ys(v)}" r="3" fill="#6FA289" opacity="0" style="transition:opacity 0.3s ease ${0.4+i*0.05}s"/>`);requestAnimationFrame(()=>requestAnimationFrame(()=>{svg.querySelectorAll('path[d]').forEach((p,i)=>{if(i===0)p.style.opacity='1';else p.style.strokeDashoffset='0';});svg.querySelectorAll('circle').forEach(c=>c.style.opacity='1');}));}
render();
</script></body></html>
