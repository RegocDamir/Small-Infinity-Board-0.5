<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Roboto',sans-serif;padding:20px;color:rgba(255,255,255,0.85);display:flex;gap:16px;align-items:flex-start}
h3{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px}
.leg{font-size:9px;color:rgba(255,255,255,0.35);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#6FA289;flex-shrink:0}
</style></head><body>
<div><h3 id="ttl">Data Gata</h3><svg id="svg" width="190" height="190" viewBox="0 0 190 190"></svg></div>
<div id="leg" style="padding-top:28px"></div>
<script>

const COLORS=['#6FA289','#00B09A','#2B79E0','#E87820','#E84040','#4DC547','#9B59B6','#F5F0D8'];

function getMyId(){try{const me=window.frameElement;if(!me)return null;const n=me.closest('[id^="node-"]');return n?n.id.replace('node-',''):null;}catch(e){return null;}}

function readController(){
  // Strategy 1: read via connections + contentDocument
  try{
    const myId=getMyId();
    if(myId){
      const conns=(typeof connections!=='undefined'?connections:[])||(window.parent&&window.parent.connections)||[];
      for(const c of conns){
        if(c.from!==myId&&c.to!==myId)continue;
        const oid=c.from===myId?c.to:c.from;
        const oNode=window.parent.document.getElementById('node-'+oid);
        const frame=oNode&&oNode.querySelector('.node-html-frame');
        const doc=frame&&(frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document));
        const el=doc&&doc.querySelector('.dc-data');
        if(el&&el.value){try{return JSON.parse(el.value);}catch(e){}}
      }
    }
  }catch(e){}
  // Strategy 2: broadcast global
  try{if(window.parent&&window.parent._DC_DATA)return window.parent._DC_DATA;}catch(e){}
  return null;
}

let _lastData=null;
function poll(){
  const d=readController();
  const s=JSON.stringify(d);
  const prev=JSON.stringify(_lastData);
  if(s!==prev){_lastData=d;render();}
}
setInterval(poll,120);
try{window.parent.addEventListener('dc:update',()=>{const d=readController();if(d){_lastData=d;render();}});}catch(e){}

function getRows(){const c=readController();if(c&&c.rows&&c.rows.length){const mx=Math.max(...c.rows.map(r=>r.a))||1;return c.rows.map(r=>({l:r.l,v:r.a/mx}));}return[{l:'Speed',v:0.85},{l:'Accuracy',v:0.72},{l:'Coverage',v:0.91},{l:'Depth',v:0.68},{l:'Reach',v:0.88},{l:'Stealth',v:0.76}];}
function render(){const rows=getRows();const c=readController();if(c&&c.title)document.getElementById('ttl').textContent=c.title;const N=rows.length;const cx=95,cy=95,R=74;const svg=document.getElementById('svg');const leg=document.getElementById('leg');svg.innerHTML='';leg.innerHTML='';const ang=i=>(i/N)*2*Math.PI-Math.PI/2;const pt=(i,r)=>[cx+r*Math.cos(ang(i)),cy+r*Math.sin(ang(i))];[.25,.5,.75,1].forEach(f=>{const d=rows.map((_,i)=>pt(i,R*f)).map((p,i)=>(i?'L':'M')+p.join(',')).join('')+'Z';svg.innerHTML+=`<path d="${d}" fill="none" stroke="rgba(255,255,255,0.06)"/>`;});rows.forEach((_,i)=>{const[x,y]=pt(i,R);svg.innerHTML+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="rgba(255,255,255,0.06)"/>`;});rows.forEach((r,i)=>{const[x,y]=pt(i,R+15);svg.innerHTML+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="9" font-family="Roboto" fill="rgba(255,255,255,0.4)">${r.l}</text>`;});const wd=rows.map((r,i)=>{const[x,y]=pt(i,R*r.v);return(i?'L':'M')+x+','+y;}).join('')+'Z';svg.innerHTML+=`<path d="${wd}" fill="rgba(111,162,137,0.15)" stroke="#6FA289" stroke-width="1.5" opacity="0" style="transition:opacity 1s ease"/>`;rows.forEach((r,i)=>{const[x,y]=pt(i,R*r.v);svg.innerHTML+=`<circle cx="${x}" cy="${y}" r="3" fill="#6FA289" opacity="0.8"/>`;leg.innerHTML+=`<div class="leg"><div class="dot"></div>${r.l}: ${Math.round(r.v*100)}%</div>`;});setTimeout(()=>svg.querySelector('path[stroke="#6FA289"]').style.opacity='1',40);}
render();
</script></body></html>
