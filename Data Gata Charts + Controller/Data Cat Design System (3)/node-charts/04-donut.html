<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;font-family:'Roboto',sans-serif;padding:20px;color:rgba(255,255,255,0.85);display:flex;flex-direction:column;align-items:center}
h3{font-size:10px;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px;align-self:flex-start}
.wrap{position:relative;display:inline-block}
.cl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.cv{font-size:22px;font-weight:300;color:rgba(255,255,255,0.9)}
.cs{font-size:8px;color:rgba(255,255,255,0.25);letter-spacing:0.1em;text-transform:uppercase}
.legend{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:rgba(255,255,255,0.4)}
.dot{width:7px;height:7px;border-radius:50%}
</style></head><body>
<h3 id="ttl">Data Gata</h3>
<div class="wrap">
  <svg width="160" height="160" viewBox="0 0 160 160" id="donut"></svg>
  <div class="cl"><div class="cv" id="cv">0</div><div class="cs">total</div></div>
</div>
<div class="legend" id="leg"></div>
<script>

const COLORS=['#6FA289','#00B09A','#2B79E0','#E87820','#E84040','#4DC547','#9B59B6','#F5F0D8'];

function getMyId(){try{const me=window.frameElement;if(!me)return null;const n=me.closest('[id^="node-"]');return n?n.id.replace('node-',''):null;}catch(e){return null;}}

function readController(){
  // Strategy 1: read via connections + contentDocument
  try{
    const myId=getMyId();
    if(myId){
      const conns=(typeof connections!=='undefined'?connections:[])||(window.parent&&window.parent.connections)||[];
      for(const c of conns){
        if(c.from!==myId&&c.to!==myId)continue;
        const oid=c.from===myId?c.to:c.from;
        const oNode=window.parent.document.getElementById('node-'+oid);
        const frame=oNode&&oNode.querySelector('.node-html-frame');
        const doc=frame&&(frame.contentDocument||(frame.contentWindow&&frame.contentWindow.document));
        const el=doc&&doc.querySelector('.dc-data');
        if(el&&el.value){try{return JSON.parse(el.value);}catch(e){}}
      }
    }
  }catch(e){}
  // Strategy 2: broadcast global
  try{if(window.parent&&window.parent._DC_DATA)return window.parent._DC_DATA;}catch(e){}
  return null;
}

let _lastData=null;
function poll(){
  const d=readController();
  const s=JSON.stringify(d);
  const prev=JSON.stringify(_lastData);
  if(s!==prev){_lastData=d;render();}
}
setInterval(poll,120);
try{window.parent.addEventListener('dc:update',()=>{const d=readController();if(d){_lastData=d;render();}});}catch(e){}

function getRows(){const c=readController();if(c&&c.rows&&c.rows.length)return c.rows.map((r,i)=>({l:r.l,v:r.a,col:COLORS[i%COLORS.length]}));return[{l:'Watch',v:42},{l:'Share',v:28},{l:'Comment',v:18},{l:'Save',v:12}].map((d,i)=>({...d,col:COLORS[i%COLORS.length]}));}
function render(){const rows=getRows();const c=readController();if(c&&c.title)document.getElementById('ttl').textContent=c.title;const total=rows.reduce((s,r)=>s+r.v,0)||1;document.getElementById('cv').textContent=total;const R=68,ri=40,cx=80,cy=80;let ang=-Math.PI/2;const svg=document.getElementById('donut');const leg=document.getElementById('leg');svg.innerHTML='';leg.innerHTML='';rows.forEach((r,i)=>{const sw=(r.v/total)*2*Math.PI;const end=ang+sw;const lg=sw>Math.PI?1:0;const pol=(a,rad)=>[cx+rad*Math.cos(a),cy+rad*Math.sin(a)];const[ox,oy]=pol(ang,R);const[ix,iy]=pol(ang,ri);const[ox2,oy2]=pol(end,R);const[ix2,iy2]=pol(end,ri);const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${ox},${oy} A${R},${R} 0 ${lg},1 ${ox2},${oy2} L${ix2},${iy2} A${ri},${ri} 0 ${lg},0 ${ix},${iy} Z`);p.setAttribute('fill',r.col);p.setAttribute('stroke','#000');p.setAttribute('stroke-width','2');p.style.opacity='0';p.style.transition=`opacity 0.5s ease ${i*0.12}s`;svg.appendChild(p);leg.innerHTML+=`<div class="leg"><div class="dot" style="background:${r.col}"></div>${r.l}</div>`;ang=end;});setTimeout(()=>svg.querySelectorAll('path').forEach(p=>p.style.opacity='1'),40);}
render();
</script></body></html>
