<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;font-family:'Roboto',sans-serif;color:rgba(255,255,255,0.8);font-size:12px;padding:12px;height:100vh;overflow:auto}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,0.07)}
.top-title{font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#39FF14}
.status{font-size:8px;color:rgba(255,255,255,0.2);letter-spacing:0.08em}
.status.live{color:#39FF14}
input[type="text"]{background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);font-family:'Roboto',sans-serif;font-size:11px;width:100%;outline:none;padding:3px 0;transition:border-color 0.15s}
input[type="text"]:focus{border-color:#39FF14;color:#fff}
input[type="number"]{background:rgba(57,255,20,0.06);border:1px solid rgba(57,255,20,0.2);color:#39FF14;font-family:'Roboto',sans-serif;font-size:11px;width:50px;outline:none;padding:3px 5px;text-align:right;font-weight:500;transition:border-color 0.15s}
input[type="number"]:focus{border-color:#39FF14;background:rgba(57,255,20,0.1)}
.lbl{font-size:8px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:6px;display:block}
.title-row{margin-bottom:10px}
table{width:100%;border-collapse:collapse}
thead th{font-size:8px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.2);padding:0 0 5px;text-align:left;font-weight:400}
thead th:last-child{width:18px}
td{padding:2px 3px 2px 0}
td:last-child{width:18px}
.del{background:none;border:none;color:rgba(255,255,255,0.12);cursor:pointer;font-size:11px;padding:1px 3px;font-family:monospace;transition:color 0.1s}
.del:hover{color:#E84040}
.add-btn{background:transparent;border:1px dashed rgba(255,255,255,0.1);color:rgba(255,255,255,0.2);font-size:8px;letter-spacing:0.1em;padding:5px;width:100%;cursor:pointer;margin-top:8px;font-family:'Roboto',sans-serif;transition:all 0.15s;text-transform:uppercase}
.add-btn:hover{border-color:#39FF14;color:#39FF14}
.section{margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.pulse{display:inline-block;width:5px;height:5px;border-radius:50%;background:#39FF14;margin-right:5px;animation:none}
.pulse.go{animation:blink 0.4s ease-out}
@keyframes blink{0%{opacity:1;transform:scale(1.4)}100%{opacity:0.4;transform:scale(1)}}
/* Hidden data carrier — chart nodes read this */
#dc-data{display:none}
</style>
</head><body>

<div class="top">
  <span class="top-title"><span class="pulse" id="pulse"></span>Controller</span>
  <span class="status" id="status">no chart connected</span>
</div>

<div class="title-row">
  <span class="lbl">Chart title</span>
  <input type="text" id="title" value="My Chart" oninput="push()">
</div>

<div>
  <table>
    <thead><tr><th>Label</th><th>A</th><th>B</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
  <button class="add-btn" onclick="addRow()">+ row</button>
</div>

<!-- This element carries the live data. Chart nodes read it via contentDocument. -->
<input type="hidden" id="dc-data" class="dc-data" value="">

<script>
let data = {
  title: 'My Chart',
  rows: [
    {l:'Alpha', a:80, b:60},
    {l:'Beta',  a:65, b:72},
    {l:'Gamma', a:91, b:50},
    {l:'Delta', a:44, b:88},
    {l:'Epsilon',a:73,b:35},
  ]
};

function buildRows() {
  const tbody = document.getElementById('rows');
  tbody.innerHTML = data.rows.map((r,i) => `
    <tr>
      <td><input type="text"   value="${r.l}" oninput="data.rows[${i}].l=this.value;push()" style="width:72px"></td>
      <td><input type="number" value="${r.a}" min="0" max="9999" oninput="data.rows[${i}].a=+this.value;push()"></td>
      <td><input type="number" value="${r.b}" min="0" max="9999" oninput="data.rows[${i}].b=+this.value;push()" style="border-color:rgba(43,121,224,0.4);color:#2B79E0;background:rgba(43,121,224,0.06)"></td>
      <td><button class="del" onclick="removeRow(${i})">×</button></td>
    </tr>`).join('');
}

function addRow()    { data.rows.push({l:'New', a:50, b:40}); buildRows(); push(); }
function removeRow(i){ data.rows.splice(i,1); buildRows(); push(); }

function push() {
  data.title = document.getElementById('title').value;
  const json = JSON.stringify(data);

  // 1. Write to hidden carrier element (charts read via contentDocument)
  document.getElementById('dc-data').value = json;

  // 2. Write to parent global as broadcast fallback
  try { window.parent._DC_DATA = data; } catch(e) {}

  // 3. Dispatch event on parent so charts react instantly
  try { window.parent.dispatchEvent(new CustomEvent('dc:update')); } catch(e) {}

  // Pulse indicator
  const p = document.getElementById('pulse');
  p.classList.remove('go');
  void p.offsetWidth;
  p.classList.add('go');

  checkConnections();
}

// Count connected chart nodes
function checkConnections() {
  try {
    const myFrame = [...window.parent.document.querySelectorAll('.node-html-frame')]
      .find(f => f.contentWindow === window);
    if (!myFrame) return;
    const myId = myFrame.closest('[id^="node-"]').id.replace('node-', '');
    const conns = (window.parent.connections || []).filter(c => c.from === myId || c.to === myId);
    const st = document.getElementById('status');
    if (conns.length === 0) { st.textContent = 'no chart connected'; st.className = 'status'; }
    else { st.textContent = conns.length + ' chart' + (conns.length > 1 ? 's' : '') + ' connected'; st.className = 'status live'; }
  } catch(e) {}
}

// Init
buildRows();
push();

// Periodically refresh connection count
setInterval(checkConnections, 1000);
</script>
</body></html>
